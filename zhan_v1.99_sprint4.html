<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>斩 v1.0</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e; color: #eee;
  min-height: 100dvh; display: flex; justify-content: center; align-items: flex-start;
  touch-action: manipulation; user-select: none; -webkit-user-select: none; overflow-x: hidden;
}
#app { width: 100%; max-width: 520px; padding: 6px; display: flex; flex-direction: column; gap: 4px; }

/* spirit bomb bar */
#spirit-bar-wrap { background: #16213e; border-radius: 8px; padding: 3px 8px; display: flex; align-items: center; gap: 6px; font-size: 10px; }
#spirit-bar-wrap .spirit-label { color: #f39c12; font-weight: bold; white-space: nowrap; }
#spirit-bar-outer { flex: 1; height: 8px; background: #0f3460; border-radius: 4px; overflow: hidden; }
#spirit-bar-inner { height: 100%; background: linear-gradient(90deg, #e67e22, #f1c40f, #f39c12); border-radius: 4px; transition: width 0.3s; width: 0%; }

/* top row */
#top-row { display: flex; gap: 6px; }
#top-row > div { flex: 1; background: #16213e; border-radius: 10px; padding: 4px 5px; display: flex; flex-direction: column; align-items: center; gap: 1px; }
.avatar { font-size: 24px; line-height: 1; }
.entity-name { font-size: 9px; color: #888; letter-spacing: 1px; }
.stat-row { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; font-size: 10px; width: 100%; }
.stat-row .stat-item { display: flex; align-items: center; gap: 1px; background: #0f3460; padding: 0 5px; border-radius: 4px; line-height: 1.5; }
.stat-row .stat-item .val { font-weight: bold; }
.stat-hp .val { color: #e74c3c; }
.stat-shield .val { color: #3498db; }
.stat-power .val { color: #9b59b6; }
.enemy-avatar { font-size: 30px; }
.player-box { border-top: 3px solid #3498db; }
.enemy-box { border-top: 3px solid #e74c3c; }

/* badges */
.badge-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 1px; }
.badge { font-size: 8px; padding: 0 4px; border-radius: 3px; line-height: 1.5; font-weight: bold; }
.badge-stun { background: #6c3483; color: #d7bde2; }
.badge-vuln { background: #7b241c; color: #f5b7b1; }
.badge-atk-down { background: #4a235a; color: #d2b4de; }
.badge-atk-up { background: #6e2c00; color: #f0b27a; }
.badge-def-up { background: #0b5345; color: #a3e4d7; }

/* deck info */
#deck-info { display: flex; justify-content: center; gap: 6px; font-size: 10px; color: #888; padding: 1px 0; }
#deck-info span { background: #0f3460; padding: 1px 6px; border-radius: 4px; }

/* enemy intent */
#enemy-intent { font-size: 10px; margin-top: 1px; color: #aaa; }

/* board */
#board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: #16213e; border-radius: 10px; padding: 4px; touch-action: none; }
.card-slot { background: #0f3460; border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: transform 0.06s; aspect-ratio: 1 / 1; }
.card-slot:active { transform: scale(0.93); }
.card-slot .card { width: 100%; height: 100%; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; gap: 0; transition: opacity 0.15s; pointer-events: none; position: relative; }
.card-slot .card .card-icon { font-size: 18px; line-height: 1; }
.card-slot .card .card-label { font-size: 7px; opacity: 0.8; letter-spacing: 0; pointer-events: none; line-height: 1; }
.card-slot .card .card-count { position: absolute; top: 1px; left: 2px; font-size: 10px; color: #fff; font-weight: 900; opacity: 0.9; background: rgba(0,0,0,0.4); padding: 0 3px; border-radius: 3px; line-height: 1.3; }
.card-empty { background: transparent; border: 1px dashed #2c3e50; cursor: default; }
.card-empty .card { display: none; }
.card-slot .stack-count { position: absolute; top: 2px; left: 3px; font-size: 10px; color: #111; font-weight: 900; opacity: 1; background: rgba(255,255,255,0.85); padding: 0 4px; border-radius: 3px; line-height: 1.3; }
.card-slot.locked { opacity: 0.4; cursor: not-allowed; }
.card-slot.smeared { filter: blur(4px); }
.card-slot.double-tap-active { outline: 2px solid #f1c40f; transform: translateY(-2px); z-index: 10; }

/* card colors */
.card-attack { background: #c0392b; color: #fff; }
.card-defend { background: #2980b9; color: #fff; }
.card-heal { background: #e91e63; color: #fff; }
.card-wild { background: #f39c12; color: #fff; }
.card-atk-down { background: #8e44ad; color: #fff; }
.card-vulnerable { background: #a93226; color: #fff; }
.card-stun { background: #9b59b6; color: #fff; }
.card-atk-buff { background: #e67e22; color: #fff; }
.card-def-buff { background: #16a085; color: #fff; }
.card-junk { background: #555; color: #999; }
.card-special-atk { background: #fff; color: #333; border: 1px solid #ddd; }
.card-special-def { background: #fff; color: #333; border: 1px solid #ddd; }
.card-divine { background: #fff; color: #333; border: 1px solid #ddd; }
.card-special { background: #fff; color: #333; border: 1px solid #ddd; }

/* slot */
#slot-bar { display: flex; gap: 2px; background: #16213e; border-radius: 10px; padding: 3px; min-height: 40px; }
.eslot { flex: 1; background: #0f3460; border-radius: 4px; border: 1px dashed #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; transition: all 0.1s; aspect-ratio: 1 / 1.1; }
.eslot.filled { border-style: solid; }
.eslot.filled.attack { background: #c0392b; border-color: #c0392b; }
.eslot.filled.defend { background: #2980b9; border-color: #2980b9; }
.eslot.filled.heal { background: #e91e63; border-color: #e91e63; }
.eslot.filled.wild { background: #f39c12; border-color: #f39c12; }
.eslot.filled.atk-down { background: #8e44ad; border-color: #8e44ad; }
.eslot.filled.vulnerable { background: #a93226; border-color: #a93226; }
.eslot.filled.stun { background: #9b59b6; border-color: #9b59b6; }
.eslot.filled.atk-buff { background: #e67e22; border-color: #e67e22; }
.eslot.filled.def-buff { background: #16a085; border-color: #16a085; }
.eslot.wild-core { background: #f39c12; border-color: #e67e22; color: #fff; position: relative; }
.wild-core-label { position: absolute; bottom: 1px; font-size: 6px; color: #fff; opacity: 0.8; }
.eslot.filled.junk { background: #555; border-color: #555; }
.eslot.filled.special { background: #fff; border-color: #ddd; color: #333; }
.eslot.locked { opacity: 0.3; border-color: #666; color: #e74c3c; font-size: 16px; font-weight: bold; }
.eslot.preview { border-color: #f1c40f; background: rgba(241,196,15,0.08); }

/* combo bar */
#combo-bar { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; font-size: 10px; padding: 1px 0; min-height: 16px; }
.combo-preview { background: #0f3460; border-radius: 4px; padding: 1px 6px; font-weight: bold; font-size: 10px; }
.combo-preview.atk { border-left: 2px solid #c0392b; color: #e74c3c; }
.combo-preview.def { border-left: 2px solid #2980b9; color: #3498db; }
.combo-preview.heal { border-left: 2px solid #e91e63; color: #f06292; }
.combo-preview.wild { border-left: 2px solid #f39c12; color: #f1c40f; }
.combo-preview.atk-down { border-left: 2px solid #8e44ad; color: #bb8fce; }
.combo-preview.vulnerable { border-left: 2px solid #a93226; color: #e6b0aa; }
.combo-preview.stun { border-left: 2px solid #9b59b6; color: #d2b4de; }
.combo-preview.atk-buff { border-left: 2px solid #e67e22; color: #f0b27a; }
.combo-preview.def-buff { border-left: 2px solid #16a085; color: #76d7c4; }
.combo-none { color: #555; font-size: 10px; }

/* actions */
#actions { display: flex; gap: 6px; }
#actions button { flex: 1; padding: 7px; border: none; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: transform 0.06s, opacity 0.1s; touch-action: manipulation; }
#actions button:active { transform: scale(0.96); }
#actions button:disabled { opacity: 0.3; cursor: default; transform: none; }
#btn-end-turn { background: #e67e22; color: #fff; }
#btn-end-turn:disabled { background: #7f8c8d; }
#btn-reset { background: #2c3e50; color: #ccc; }

/* log */
#log { background: #0d1b2a; border-radius: 8px; padding: 3px 6px; font-size: 9px; min-height: 28px; max-height: 56px; overflow-y: auto; color: #7f8c8d; line-height: 1.3; }
#log .highlight { color: #f1c40f; }
#log .dmg { color: #e74c3c; }
#log .def { color: #3498db; }
#log .heal { color: #2ecc71; }
#log .buff { color: #f39c12; }

/* result overlay */
#result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
#result-overlay.show { display: flex; }
#result-box { background: #16213e; border-radius: 16px; padding: 22px 28px; text-align: center; max-width: 280px; }
#result-box h2 { font-size: 22px; margin-bottom: 8px; }
#result-box p { color: #aaa; margin-bottom: 14px; font-size: 13px; }
#result-box button { padding: 8px 30px; border: none; border-radius: 8px; background: #e67e22; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; }
#result-box button:active { transform: scale(0.96); }

/* stats panel */
#stats-panel { margin: 6px 0 10px 0; }
.stats-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  animation: statsSlideUp 0.4s ease-out;
}
@keyframes statsSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.stat-row-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  padding: 3px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.stat-row-item:last-child { border-bottom: none; }
.stat-label { color: #888; white-space: nowrap; }
.stat-value { color: #f1c40f; font-weight: bold; text-align: right; word-break: break-all; }

@media (max-width: 380px) {
  #app { padding: 3px; gap: 3px; }
  .card-slot .card .card-icon { font-size: 14px; }
  .card-slot .card .card-label { font-size: 6px; }
  .avatar { font-size: 20px; }
  .enemy-avatar { font-size: 26px; }
  .stat-row .stat-item { font-size: 8px; padding: 0 3px; }
  #actions button { padding: 5px; font-size: 11px; }
  .card-slot .stack-count { font-size: 8px; }
  .badge { font-size: 7px; }
}

</style>
<style>
/* relic select */
#relic-select-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
#relic-select-overlay.show { display: flex; }
#relic-select-box { background: #16213e; border-radius: 16px; padding: 18px 22px; text-align: center; max-width: 360px; width: 90%; }
#relic-select-box h2 { font-size: 18px; margin-bottom: 4px; color: #f1c40f; }
#relic-select-desc { color: #aaa; font-size: 11px; margin-bottom: 10px; }
#relic-select-options { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.relic-card { background: #0f3460; border-radius: 10px; padding: 10px 14px; cursor: pointer; flex: 1; min-width: 120px; max-width: 160px; border: 2px solid transparent; transition: border-color 0.15s; }
.relic-card:hover, .relic-card:active { border-color: #f1c40f; }
.relic-card .relic-name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 3px; }
.relic-card .relic-type { font-size: 9px; color: #888; margin-bottom: 4px; }
.relic-card .relic-desc { font-size: 10px; color: #aaa; line-height: 1.3; }

</style>
</head>
<body>
<div id="app">
  <div id="spirit-bar-wrap">
    <span class="spirit-label">💥 元气弹</span>
    <div id="spirit-bar-outer"><div id="spirit-bar-inner"></div></div>
    <span id="spirit-text">0%</span>
  </div>
  <div id="top-row">
    <div class="player-box">
      <div class="avatar" id="player-avatar">🦸</div>
      <div class="entity-name">勇 者</div>
      <div class="stat-row">
        <span class="stat-item stat-hp"><span>❤️</span><span class="val" id="player-hp">100</span></span>
        <span class="stat-item stat-shield"><span>🛡️</span><span class="val" id="player-shield">0</span></span>
      </div>
      <div class="badge-row" id="player-badges"></div>
    </div>
    <div class="enemy-box">
      <div class="avatar enemy-avatar" id="enemy-avatar">🧶</div>
      <div class="entity-name" id="enemy-name">骷 髅</div>
      <div class="stat-row">
        <span class="stat-item stat-hp"><span>❤️</span><span class="val" id="enemy-hp">100</span></span>
        <span class="stat-item stat-shield"><span>🛡️</span><span class="val" id="enemy-shield">0</span></span>
        <span class="stat-item stat-power"><span>⚡</span><span class="val" id="enemy-power">0</span></span>
      </div>
      <div class="badge-row" id="enemy-badges"></div>
      <div id="enemy-intent">⚔️ 准备攻击</div>
    </div>
  </div>
  <div id="deck-info">
    <span>🃏 <span id="deck-remain">250</span> 张</span>
    <span>🔒 <span id="hidden-cards">0</span> 暗牌</span>
    <span>🔍 <span id="visible-cards">0</span> 可见</span>
  </div>
  <div id="board"></div>
  <div id="combo-bar"></div>
  <div id="slot-bar"></div>
  <div id="actions">
    <button id="btn-end-turn" disabled>结束回合</button>
    <button id="btn-reset">重置</button>
  </div>
  <div id="log"></div>
</div>
<div id="result-overlay">
  <div id="result-box">
    <h2 id="result-title">⚔️</h2>
    <p id="result-desc"></p>
    <div id="stats-panel"></div>
    <div id="result-buttons" style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <button id="btn-restart">🔄 再来一局</button>
      <button id="btn-endless">♾️ 无尽模式</button>
    </div>
  </div>
</div>

<!-- Boss 描述弹窗 -->
<div id="boss-info-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;">
  <div style="background:#16213e;border-radius:12px;padding:16px 20px;max-width:300px;text-align:center;">
    <div id="boss-info-emoji" style="font-size:40px;margin-bottom:4px;"></div>
    <div id="boss-info-name" style="font-size:16px;font-weight:bold;color:#f1c40f;margin-bottom:4px;"></div>
    <div id="boss-info-mechanic" style="font-size:11px;color:#aaa;line-height:1.4;margin-bottom:6px;"></div>
    <div id="boss-info-stats" style="font-size:10px;color:#888;"></div>
    <button id="btn-boss-info-close" style="margin-top:10px;padding:4px 20px;border:none;border-radius:6px;background:#e67e22;color:#fff;font-size:12px;cursor:pointer;">关闭</button>
  </div>
</div>

<!-- 勇者圣物弹窗（独立于 Boss 弹窗） -->
<div id="player-info-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;">
  <div style="background:#16213e;border-radius:12px;padding:16px 20px;max-width:300px;text-align:center;">
    <div id="player-info-emoji" style="font-size:40px;margin-bottom:4px;">🦸</div>
    <div id="player-info-name" style="font-size:16px;font-weight:bold;color:#3498db;margin-bottom:4px;">勇者圣物</div>
    <div id="player-info-mechanic" style="font-size:11px;color:#aaa;line-height:1.4;margin-bottom:6px;"></div>
    <div id="player-info-stats" style="font-size:10px;color:#888;"></div>
    <button id="btn-player-info-close" style="margin-top:10px;padding:4px 20px;border:none;border-radius:6px;background:#e67e22;color:#fff;font-size:12px;cursor:pointer;">关闭</button>
  </div>
</div>

<!-- 圣物选择界面 -->
<div id="relic-select-overlay">
  <div id="relic-select-box">
    <h2>🎁 选择圣物</h2>
    <p id="relic-select-desc">第二关通过！选择一个圣物</p>
    <div id="relic-select-options"></div>
    <div id="relic-select-buttons" style="display:flex;gap:6px;margin-top:8px;justify-content:center;">
      <button id="btn-relic-reroll" style="padding:6px 16px;border:none;border-radius:8px;background:#2c3e50;color:#ccc;font-size:12px;font-weight:bold;cursor:pointer;">🔄 刷新</button>
      <button id="btn-relic-confirm" style="padding:6px 16px;border:none;border-radius:8px;background:#e67e22;color:#fff;font-size:12px;font-weight:bold;cursor:pointer;">✅ 确认（全拿）</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  斩 v14 — data.js
//  所有配置数据：Boss定义、圣物定义、卡牌、数值常量
// ============================================================

// ========== 战斗数值常量 ==========
var CONFIG = {
  BOARD_ROWS: 5,
  BOARD_COLS: 5,
  SLOT_SIZE: 10,
  PLAYER_HP: 100,
  PLAYER_MAX_HP: 100,

  // Boss 默认（第二关毛线团/第三关Boss各自覆盖）
  ENEMY_HP: 100,
  ENEMY_START_SHIELD: 0,
  ENEMY_BASE_ATK: 12,
  ENEMY_CYCLE: 7,
  SHIELD_RESET_ON_OWN_TURN: true,

  MIN_COMBO: 3,
  DOUBLE_TAP_DELAY: 350,     // 双击判定间隔 ms
  LONG_PRESS_DELAY: 600,     // 长按触发间隔 ms
  SWIPE_THRESHOLD: 20,       // 下滑拖拽阈值 px
  LOG_MAX_LINES: 100,        // 日志最大行数
  VULN_MULT: 1.5,
  ATK_BUFF_MULT: 1.5,
  DEF_BUFF_RATIO: 0.7,
  ATK_DOWN_PCT: 30,
  UNMATCHED_PENALTY: 1,
};

// ========== 卡牌定义 ==========
var CARD_TYPES = {
  attack:     { emoji: '🗡', label: '攻击', color: 'attack',     cssClass: 'card-attack' },
  defend:     { emoji: '🛡️', label: '防御', color: 'defend',      cssClass: 'card-defend' },
  heal:       { emoji: '❤️', label: '回血', color: 'heal',        cssClass: 'card-heal' },
  wild:       { emoji: '💎', label: '万能', color: 'wild',        cssClass: 'card-wild' },
  atk_down:   { emoji: '⬇️', label: '降攻', color: 'atk-down',    cssClass: 'card-atk-down' },
  vulnerable: { emoji: '💔', label: '易伤', color: 'vulnerable',  cssClass: 'card-vulnerable' },
  stun:       { emoji: '💫', label: '眩晕', color: 'stun',        cssClass: 'card-stun' },
  atk_buff:   { emoji: '⚡', label: '攻加', color: 'atk-buff',    cssClass: 'card-atk-buff' },
  def_buff:   { emoji: '💨', label: '减伤', color: 'def-buff',    cssClass: 'card-def-buff' },
  special_atk:{ emoji: '🙈', label: '特攻', color: 'special',     cssClass: 'card-special-atk' },
  special_def:{ emoji: '🙉', label: '特防', color: 'special',     cssClass: 'card-special-def' },
  divine:     { emoji: '🙊', label: '免伤', color: 'special',     cssClass: 'card-divine' },
};

var BUFF_TYPES = { vulnerable:1, stun:1, atk_buff:1, def_buff:1, atk_down:1 };

// ========== 牌组构成 ==========
// TASK: CARD_DOUBLE — 全部卡牌数量 ×2
var DECK_SIZES = {
  attack:     100,
  defend:     100,
  heal:       50,
  wild:       20,
  atk_down:   50,
  vulnerable: 50,
  stun:       30,
  atk_buff:   40,
  def_buff:   40,
};

(function() {
  var total = 0;
  for (var k in DECK_SIZES) total += DECK_SIZES[k];
  CONFIG.TOTAL_CARDS = total;
  CONFIG.CARDS_PER_PILE = Math.floor(total / (CONFIG.BOARD_ROWS * CONFIG.BOARD_COLS));
})();

// ========== Boss 行动循环模板（新版7回合） ==========
// 所有 Boss 共用，10只猫猫在此基础上加专属 traits
var BOSS_CYCLE_TEMPLATE = [
  { type: 'attack' },
  { type: 'defend' },
  { type: 'buff_power' },
  { type: 'attack' },
  { type: 'defend' },
  { type: 'charge' },
  { type: 'rage' },
];

// ========== Boss 定义 ==========

<script>

// Array.prototype.flat() Polyfill（兼容旧浏览器）
if (!Array.prototype.flat) {
  Array.prototype.flat = function(depth) {
    depth = depth === undefined ? 1 : parseInt(depth, 10);
    if (depth < 1) return this.slice();
    var result = [];
    for (var i = 0; i < this.length; i++) {
      var val = this[i];
      if (Array.isArray(val)) {
        result = result.concat(val.flat(depth - 1));
      } else {
        result.push(val);
      }
    }
    return result;
  };
}

// flatten 工具函数（安全替代 .flat()，兼容所有浏览器）
function flatten(arr) {
  var result = [];
  for (var i = 0; i < arr.length; i++) {
    for (var j = 0; j < arr[i].length; j++) {
      result.push(arr[i][j]);
    }
  }
  return result;
}

// ========== Zhan.Systems — 声明式效果执行引擎 ==========
if (!window.Zhan) window.Zhan = {};
Zhan.Systems = {};

// --- Relic Effects ---
Zhan.Systems.Relic = {
  _handlers: {
    multiplyDeckCard: function(G, params) { G.deckConfig[params.cardType] *= params.factor; },
    setEffectiveMinCombo: function(G, params) { G.effectiveMinCombo = params.value; },
    increaseSlotSize: function(G, params) { G.effectiveSlotSize = (G.effectiveSlotSize || CONFIG.SLOT_SIZE) + params.amount; },
    setBuffDurationBonus: function(G, params) { G.buffDurationBonus = params.amount; },
    enableWildCoreSlot: function(G) {
      G.wildCoreSlot = true;
      G.effectiveSlotSize = (G.effectiveSlotSize || CONFIG.SLOT_SIZE) + 1;
    },
    setOverloadBuffs: function(G, params) {
      G.atkBuffMult = params.atkBuffMult;
      G.vulnMult = params.vulnMult;
      G.defBuffRatio = params.defBuffRatio;
    },
    setNoUnmatchedPenalty: function(G, params) { G.noUnmatchedPenalty = params.value; },
    addSpecialCards: function(G, params) { G.specialCards = params.cards; },
    enableTenacity: function(G) { G.tenacityUsed = false; },
    enableFury: function(G) { G.furyEnabled = true; },
    increaseMaxHP: function(G, params) { G.playerMaxHP = CONFIG.PLAYER_MAX_HP + params.amount; }
  },

  applyInit: function(G) {
    var relics = G.activeRelics || [];
    for (var i = 0; i < relics.length; i++) {
      var relicDef = RELICS[relics[i]];
      if (!relicDef || !relicDef.effects) continue;
      for (var j = 0; j < relicDef.effects.length; j++) {
        var eff = relicDef.effects[j];
        if (eff.phase !== 'INIT') continue;
        var handler = this._handlers[eff.action];
        if (handler) handler(G, eff.params || {});
      }
    }
  },

  // fury_core getMultiplier — still needed at runtime with G context
  getFuryMultiplier: function(G) {
    var hpLoss = 1 - G.playerHP / G.playerMaxHP;
    return 1 + hpLoss;
  }
};

// --- Boss Trait Handlers ---
Zhan.Systems.Boss = {
  _traitHandlers: {
    lock_pile: {
      onTurnStart: function(G, params) {
        if (G.turn % params.interval !== 0) return;
        var flat = flatten(G.piles);
        var candidates = [];
        for (var i = 0; i < flat.length; i++) {
          if (flat[i].length > 0 && !G.lockedPiles[i]) candidates.push(i);
        }
        if (candidates.length < params.count) return;
        shuffleArray(candidates);
        G.lockedPiles = G.lockedPiles || {};
        for (var ci = 0; ci < params.count; ci++) {
          G.lockedPiles[candidates[ci]] = params.duration;
        }
        log('🐱 狸花锁牌：锁定了' + params.count + '摞牌，持续' + params.duration + '回合');
      },
      onTurnEnd: function(G, params) {
        if (!G.lockedPiles) return;
        for (var k in G.lockedPiles) {
          G.lockedPiles[k]--;
          if (G.lockedPiles[k] <= 0) delete G.lockedPiles[k];
        }
      }
    },
    lick_player: {
      onTurnStart: function(G, params) {
        if (G.turn < params.minTurn || G.turn % params.interval !== 0) return;
        if (G.playerEffects.atk_buff) delete G.playerEffects.atk_buff;
        if (G.playerEffects.def_buff) delete G.playerEffects.def_buff;
        log('🐱 斯芬克斯舔你！玩家 Buff 被舔掉');
      }
    },
    lock_slot: {
      onTurnStart: function(G, params) {
        if (G.turn % params.interval !== 0) return;
        var free = [];
        for (var i = 0; i < CONFIG.SLOT_SIZE; i++) {
          if (!G.lockedSlots || !G.lockedSlots[i]) free.push(i);
        }
        if (free.length < params.count) return;
        shuffleArray(free);
        G.lockedSlots = G.lockedSlots || {};
        for (var ci = 0; ci < params.count; ci++) {
          G.lockedSlots[free[ci]] = params.duration;
        }
        log('🐱 英短锁槽：锁定了' + params.count + '个槽位，持续' + params.duration + '回合');
      },
      onTurnEnd: function(G, params) {
        if (!G.lockedSlots) return;
        for (var k in G.lockedSlots) {
          G.lockedSlots[k]--;
          if (G.lockedSlots[k] <= 0) delete G.lockedSlots[k];
        }
      }
    },
    hide_intent: {
      onTurnStart: function(G) { G.hideIntent = true; }
    },
    random_discard: {
      onResolve: function(G, combos) {
        if (!G.slot.length) return;
        var idx = Math.floor(Math.random() * G.slot.length);
        var card = G.slot.splice(idx, 1)[0];
        log('🐱 阿比拍飞了一张 ' + CARD_TYPES[card.type].emoji + '！');
      }
    },
    smear_piles: {
      onTurnStart: function(G, params) {
        G.smearedPiles = {};
        var flat = flatten(G.piles);
        var candidates = [];
        for (var i = 0; i < flat.length; i++) {
          if (flat[i].length > 0) candidates.push(i);
        }
        if (candidates.length < params.count) return;
        shuffleArray(candidates);
        for (var ci = 0; ci < params.count; ci++) {
          G.smearedPiles[candidates[ci]] = true;
        }
        log('🐱 布偶趴牌：涂抹了' + params.count + '摞牌');
      }
    },
    time_limit: {
      onTurnStart: function(G, params) {
        G.maxTurns = G.maxTurns || params.maxTurns;
        if (G.turn >= G.maxTurns) {
          endGame(false, '⏰ ' + params.maxTurns + '回合已到！豹猫赢了...');
        }
      }
    },
    insert_junk: {
      onTurnStart: function(G, params) {
        var halfHP = G.enemyMaxHP / 2;
        var junkCount = (G.enemyHP > halfHP) ? (G.turn % 2 === 0 ? 0 : 1) : 1;
        if (junkCount === 0) return;
        for (var j = 0; j < junkCount; j++) {
          var flat = flatten(G.piles);
          var candidates = [];
          for (var i = 0; i < flat.length; i++) {
            if (flat[i].length > 0) candidates.push(i);
          }
          if (!candidates.length) return;
          var idx = candidates[Math.floor(Math.random() * candidates.length)];
          flat[idx].push({ type: 'junk', id: G.pickedId++, isJunk: true });
        }
        log('🐱 暹罗捣乱：塞了' + junkCount + '张废牌！');
      }
    },
    stun_player: {
      onTurnStart: function(G, params) {
        if (G.turn >= params.minTurn && G.turn % params.interval === 0) {
          G.playerSkipped = true;
          log('🐱 折耳发作！玩家本回合无法行动');
        }
      }
    }
  },

  _hpTriggerHandlers: {
    groom: {
      condition: function(G) { return G.turn > 0 && (G.turn + 1) % 4 === 0; },
      execute: function(G) {
        G.enemyEffects.vulnerable = 0;
        G.enemyEffects.atk_down = 0;
        G.enemyEffects.atk_down_pct = 0;
        G.enemyEffects.stun = 0;
        G.effectiveVulnMult = 0;
        log('🐱 舔毛！Boss 清除自身全部 Debuff（易伤/降攻/眩晕）');
      }
    },
    hiss: {
      condition: function(G) {
        if (G.hissPrevHP === undefined) G.hissPrevHP = G.enemyMaxHP;
        var thresholds = [200, 100];
        for (var i = 0; i < thresholds.length; i++) {
          if (G.enemyHP < thresholds[i] && G.hissPrevHP >= thresholds[i]) {
            G.hissPrevHP = G.enemyHP;
            return true;
          }
        }
        G.hissPrevHP = G.enemyHP;
        return false;
      },
      execute: function(G) {
        G.playerEffects = {};
        G.enemyEffects = {};
        log('🐱 哈气！！全场 Buff/Debuff 清空！');
      }
    }
  },

  // Dispatch traits based on event name
  processEvent: function(G, eventName) {
    var boss = G.boss;
    if (!boss || !boss.traits) return;
    for (var i = 0; i < boss.traits.length; i++) {
      var trait = boss.traits[i];
      if (!trait.events || trait.events.indexOf(eventName) === -1) continue;
      var handler = this._traitHandlers[trait.id];
      if (!handler) continue;
      var fn = handler[{
        'TURN_START': 'onTurnStart',
        'TURN_END': 'onTurnEnd',
        'RESOLVE': 'onResolve'
      }[eventName]];
      if (fn) fn(G, trait.params || {});
    }
  },

  // Dispatch hpTriggers
  runHpTriggers: function(G, filterId) {
    var boss = G.boss;
    if (!boss || !boss.hpTriggers) return;
    for (var i = 0; i < boss.hpTriggers.length; i++) {
      var triggerId = boss.hpTriggers[i];
      if (typeof triggerId !== 'string') continue;
      if (filterId && triggerId !== filterId) continue;
      var handler = this._hpTriggerHandlers[triggerId];
      if (!handler) continue;
      if (handler.condition && handler.condition(G)) {
        handler.execute(G);
      }
    }
  }
};

// ========== Zhan.Rules — 纯数值计算函数 ==========
// 所有规则函数不读全局 G，依赖以参数显式传入
Zhan.Rules = {
  calcBaseValue: function(totalCount, minCombo) {
    return 4 + (totalCount - minCombo) * 2;
  },

  calcPursuitMultiplier: function(maxComboLen, minCombo) {
    if (maxComboLen < minCombo + 1) return 1;
    return 1 + (maxComboLen - minCombo) * 0.1;
  },

  calcAttackValue: function(totalCount, maxComboLen, minCombo) {
    if (totalCount < minCombo) return 0;
    return Math.ceil(Zhan.Rules.calcBaseValue(totalCount, minCombo) * Zhan.Rules.calcPursuitMultiplier(maxComboLen, minCombo));
  },

  calcDefendValue: function(totalCount, maxComboLen, minCombo) {
    if (totalCount < minCombo) return 0;
    return Math.floor(Zhan.Rules.calcBaseValue(totalCount, minCombo) * Zhan.Rules.calcPursuitMultiplier(maxComboLen, minCombo));
  },

  calcHealValue: function(totalCount, maxComboLen, minCombo) {
    if (totalCount < minCombo) return 0;
    return Math.floor(Zhan.Rules.calcBaseValue(totalCount, minCombo) * Zhan.Rules.calcPursuitMultiplier(maxComboLen, minCombo));
  },

  resolveWildType: function(slot, idx) {
    if (!slot[idx] || slot[idx].isJunk) return 'junk';
    if (slot[idx].type !== 'wild') return slot[idx].type;
    for (var k = idx-1; k >= 0; k--) {
      if (slot[k] && slot[k].type !== 'wild' && !slot[k].isJunk) {
        return slot[k].type;
      }
    }
    for (var k = idx+1; k < slot.length; k++) {
      if (slot[k] && slot[k].type !== 'wild' && !slot[k].isJunk) {
        return slot[k].type;
      }
    }
    return 'wild';
  },

  computeCombos: function(slot, minCombo) {
    if (!slot.length) { var empty = []; empty._claimedWildIndices = []; return empty; }
    var resolved = slot.map(function(c, i) {
      if (!c) return { type: 'null_placeholder', card: null, index: i, claimed: false };
      return { type: Zhan.Rules.resolveWildType(slot, i), card: c, index: i, claimed: false };
    });
    var combos = [];
    var _claimedWildIndices = [];
    var i = 0;
    while (i < resolved.length) {
      var typ = resolved[i].type;
      if (typ === 'null_placeholder' || typ === 'wild' || typ === 'junk') { i++; continue; }
      if (resolved[i].card && resolved[i].card.type === 'wild' && resolved[i].claimed) { i++; continue; }
      var j = i+1;
      while (j < resolved.length) {
        if (resolved[j].type === 'null_placeholder') { j++; continue; }
        if (resolved[j].card && resolved[j].card.type === 'wild' && resolved[j].claimed) break;
        if (resolved[j].type !== typ) break;
        j++;
      }
      var comboLen = j - i;
      if (comboLen >= minCombo) {
        for (var ci = i; ci < j; ci++) {
          if (resolved[ci].card && resolved[ci].card.type === 'wild') {
            resolved[ci].claimed = true;
            _claimedWildIndices.push(resolved[ci].index);
          }
        }
        combos.push({ n: comboLen, cards: slot.slice(i,j), type: typ, start: i, end: j });
      }
      i = j;
    }
    combos._claimedWildIndices = _claimedWildIndices;
    return combos;
  },

  getComboDuration: function(n, minCombo) {
    return Math.max(1, n - minCombo + 1);
  },

  getStunDuration: function(n, minCombo) {
    return Zhan.Rules.getComboDuration(n, minCombo);
  },

  applyStatusEffects: function(type, val, effects) {
    switch (type) {
      case 'attack':
        if (effects.atkBuffMult > 0) val = Math.ceil(val * effects.atkBuffMult);
        if (effects.vulnMult > 0) val = Math.ceil(val * effects.vulnMult);
        break;
      case 'defend':
      case 'heal':
        break;
    }
    return val;
  },

  computeEffectiveFury: function(playerHP, playerMaxHP, baseValues) {
    if (!baseValues.furyEnabled) {
      return {
        atkBuffMult: baseValues.atkBuffMult || CONFIG.ATK_BUFF_MULT,
        vulnMult: baseValues.vulnMult || CONFIG.VULN_MULT,
        defBuffRatio: baseValues.defBuffRatio || CONFIG.DEF_BUFF_RATIO
      };
    }
    var hpLoss = 1 - playerHP / playerMaxHP;
    var furyMult = 1 + hpLoss;
    var baseRatio = baseValues.defBuffRatio || CONFIG.DEF_BUFF_RATIO;
    return {
      atkBuffMult: (baseValues.atkBuffMult || CONFIG.ATK_BUFF_MULT) * furyMult,
      vulnMult: (baseValues.vulnMult || CONFIG.VULN_MULT) * furyMult,
      defBuffRatio: Math.max(0, 1 - (1 - baseRatio) * furyMult)
    };
  }
};

// Legacy wrapper: updateEffectiveFuryValues — computes fury effects and writes them back to G
function updateEffectiveFuryValues(G) {
  var furyEff = Zhan.Rules.computeEffectiveFury(G.playerHP, G.playerMaxHP, {
    furyEnabled: G.furyEnabled,
    atkBuffMult: G.atkBuffMult,
    vulnMult: G.vulnMult,
    defBuffRatio: G.defBuffRatio
  });
  G.effectiveAtkBuffMult = furyEff.atkBuffMult;
  G.effectiveVulnMult = furyEff.vulnMult;
  G.effectiveDefBuffRatio = furyEff.defBuffRatio;
}

// 跳过槽位计数（pullCard 中跨作用域用）
var _skippedSlots = 0;

// ========== Zhan.Engine — 集中状态管理 ==========
Zhan.Engine = {
  state: null,
  init: function() { newGame(); return G; },
  _pullCard: function(r, c) { return pullCard(r, c); },

  _updateEffectiveFury: function(st) {
    var furyEff = Zhan.Rules.computeEffectiveFury(st.playerHP, st.playerMaxHP, {
      furyEnabled: st.furyEnabled,
      atkBuffMult: st.atkBuffMult,
      vulnMult: st.vulnMult,
      defBuffRatio: st.defBuffRatio
    });
    st.effectiveAtkBuffMult = furyEff.atkBuffMult;
    st.effectiveVulnMult = furyEff.vulnMult;
    st.effectiveDefBuffRatio = furyEff.defBuffRatio;
  },
  dispatch: function(action) {
    if (!this.state) return;
    switch (action.type) {
      case 'PLAY_CARD':
        this._pullCard(action.r, action.c);
        break;
      case 'END_TURN':
        executeTurn();
        break;
      case 'RESET':
        ENDLESS_DEFEATED = {};
        this.state = null;
        G = {};
        G.currentStage = 1;
        G.bossId = 'skeleton';
        newGame();
        if (Zhan.UI && Zhan.UI.render) Zhan.UI.render(G);
        break;
      case 'RESTART':
        ENDLESS_DEFEATED = {};
        this.state = null;
        G = {};
        G.isEndless = false;
        G.activeRelics = [];
        G.currentStage = 1;
        G.bossId = 'skeleton';
        newGame();
        if (Zhan.UI && Zhan.UI.render) Zhan.UI.render(G);
        break;
      case 'START_ENDLESS':
        ENDLESS_DEFEATED = {};
        var es = this.init();
        es.isEndless = true;
        startEndlessNextCat();
        break;
    }
    if (this.state && Zhan.UI && Zhan.UI.render) {
      Zhan.UI.render(this.state);
    }
  }
};

// ========== 游戏状态 ==========
var G = {};

function newGame() {
  var bossId = G.bossId || 'skeleton';
  var boss = BOSSES[bossId];
  var relics = G.activeRelics || [];
  var stage = G.currentStage || 1;

  G = {
    deck: [], piles: [], slot: [],
    playerHP: CONFIG.PLAYER_MAX_HP,
    playerMaxHP: CONFIG.PLAYER_MAX_HP,
    playerShield: 0,
    enemyHP: boss.maxHP,
    enemyMaxHP: boss.maxHP,
    enemyShield: boss.startShield || 0,
    enemyPower: 0,
    turn: 0,
    phase: 'player',
    pickedId: 0,
    logLines: [],
    over: false,
    playerEffects: {},
    enemyEffects: {},
    bossId: bossId,
    boss: boss,
    activeRelics: relics,
    effectiveMinCombo: CONFIG.MIN_COMBO,
    effectiveSlotSize: CONFIG.SLOT_SIZE,
    effectiveAtkBuffMult: 0,
    effectiveVulnMult: 0,
    buffDurationBonus: 0,
    deckConfig: JSON.parse(JSON.stringify(DECK_SIZES)),
    lockedPiles: {},
    lockedSlots: {},
    smearedPiles: {},
    hideIntent: false,
    playerSkipped: false,
    currentStage: stage,
    maxCombo: 0,
    maxDamage: 0,
    totalDamage: 0,
    activeRelicNames: relics.map(function(r) { return (RELICS[r] && RELICS[r].name) || r; }),
  };

  // 初始化圣物（声明式效果执行）
  Zhan.Systems.Relic.applyInit(G);

  // 开局满血：先用 maxHP 初始化 playerHP，确保生命核心等圣物修改 maxHP 后开局满血
  G.playerHP = G.playerMaxHP;

  // 初始化哈气 prevHP（挂在 G 上，不共享全局单例）
  // 现在 hpTriggers 是字符串数组，检查是否包含 'hiss'
  if (boss.hpTriggers && boss.hpTriggers.indexOf('hiss') >= 0) {
    G.hissPrevHP = boss.maxHP;
  }

  buildDeck();
  // 美短虎斑 hide_intent：必须在首次 render() 前设置，避免第一回合意图泄漏
  if (boss.traits) {
    for (var _bi = 0; _bi < boss.traits.length; _bi++) {
      if (boss.traits[_bi].id === 'hide_intent') {
        G.hideIntent = true;
        break;
      }
    }
  }
  // 救命毫毛：特殊卡插入
  if (G.specialCards) {
    for (var sc = 0; sc < G.specialCards.length; sc++) {
      G.deck.unshift({ type: G.specialCards[sc].type, id: G.pickedId++, special: G.specialCards[sc] });
    }
    log('🪶 救命毫毛！获得' + G.specialCards.length + '张特殊卡');
  }
  shuffle(G.deck);
  buildPiles();
  Zhan.Engine.state = G;
  Zhan.Engine._updateEffectiveFury(G);
  updateEnemyIntent();
  if (Zhan.UI && Zhan.UI.render) Zhan.UI.render(G);
  log('🐱 新局开始！双击或向下拖拽卡牌进槽');
}

function buildDeck() {
  G.deck = [];
  for (var type in G.deckConfig) {
    for (var i = 0; i < G.deckConfig[type]; i++) {
      G.deck.push({ type: type, id: G.pickedId++ });
    }
  }
}

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
}

function shuffleArray(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
}

function buildPiles() {
  G.piles = [];
  for (var r = 0; r < CONFIG.BOARD_ROWS; r++) {
    G.piles[r] = [];
    for (var c = 0; c < CONFIG.BOARD_COLS; c++) G.piles[r][c] = [];
  }
  var idx = 0;
  var totalCards = G.deck.length;
  var nPiles = CONFIG.BOARD_ROWS * CONFIG.BOARD_COLS;
  var basePileSize = Math.floor(totalCards / nPiles);
  var remaining = totalCards - basePileSize * nPiles;
  var flatPiles = [];
  for (var r = 0; r < CONFIG.BOARD_ROWS; r++) {
    for (var c = 0; c < CONFIG.BOARD_COLS; c++) {
      flatPiles.push(G.piles[r][c]);
    }
  }
  for (var i = 0; i < flatPiles.length; i++) {
    var size = basePileSize + (i < remaining ? 1 : 0);
    for (var j = 0; j < size; j++) flatPiles[i].push(G.deck[idx++]);
  }
  for (var pi = 0; pi < flatPiles.length; pi++) {
    var pile = flatPiles[pi];
    if (pile.length > 1) {
      var topN = Math.min(4, pile.length);
      var top = pile.slice(0, topN);
      for (var ti = top.length - 1; ti > 0; ti--) {
        var tj = Math.floor(Math.random() * (ti + 1));
        var tt = top[ti]; top[ti] = top[tj]; top[tj] = tt;
      }
      for (var ti = 0; ti < top.length; ti++) pile[ti] = top[ti];
    }
  }
}

function getTop(pile) { return pile && pile.length ? pile[pile.length-1] : null; }
function popTop(pile) { return pile && pile.length ? pile.pop() : null; }

function pullCard(r, c) {
  if (G.phase !== 'player' || G.over) return false;
  // 检查锁定牌堆
  var flatIdx = r * CONFIG.BOARD_COLS + c;
  if (G.lockedPiles && G.lockedPiles[flatIdx]) {
    log('🔒 这摞牌被锁定了！');
    return false;
  }
  var pile = G.piles[r][c];
  var top = getTop(pile);
  if (!top || G.slot.length >= G.effectiveSlotSize) return false;
  var card = popTop(pile);
  if (!card) return false;
  // BUG4 FIX: wild_core null placeholder at first unlocked slot
  if (G.wildCoreSlot && G.slot.length === 0) {
    G.slot.push(null);
  }
  // 锁定槽位：跳过被锁槽，在后面第一个可用位置插入
  // 被锁槽在 slot 数组中保持 null 占位
  _skippedSlots = 0;
  var maxSize = G.effectiveSlotSize || CONFIG.SLOT_SIZE;
  if (G.lockedSlots) {
    var insIdx = G.slot.length;
    while (insIdx < maxSize && G.lockedSlots[insIdx]) {
      G.slot.push(null); // 占位锁定槽
      insIdx++;
      _skippedSlots++;
    }
    if (insIdx >= maxSize) {
      log('🔒 所有剩余槽位都被锁定了！');
      // BUG2 FIX: push card back to pile
      while (_skippedSlots > 0) { G.slot.pop(); _skippedSlots--; }
      pile.push(card);
      return false;
    }
  }
  G.slot.push(card);
  updateComboPreview();
  var ct = CARD_TYPES[card.type] || { emoji: '⬜', label: '废牌' };
  log(ct.emoji + ct.label + '→槽(' + G.slot.length + '/' + G.effectiveSlotSize + ')' + (_skippedSlots > 0 ? ' 🔒跳过' + _skippedSlots + '格' : ''));
  return true;
}

// 万能牌解析 & 连击计算 — 已移至 Zhan.Rules 命名空间

function getEffectDescription(state, type, n) {
  var minCombo = state.effectiveMinCombo || CONFIG.MIN_COMBO;
  var dur = Zhan.Rules.getComboDuration(n, minCombo);
  dur += state.buffDurationBonus || 0;
  switch (type) {
    case 'vulnerable':
      var vm = state.effectiveVulnMult || CONFIG.VULN_MULT;
      return '易伤×' + parseFloat(vm.toFixed(2)) + ' ' + dur + '回合';
    case 'stun':
      var stunDur = Zhan.Rules.getStunDuration(n, minCombo);
      stunDur += state.buffDurationBonus || 0;
      return '眩晕 ' + stunDur + '回合';
    case 'atk_buff':   return '攻×' + parseFloat(state.effectiveAtkBuffMult.toFixed(2)) + ' ' + dur + '回合';
    case 'def_buff':   return '减伤×' + parseFloat(state.effectiveDefBuffRatio.toFixed(2)) + ' ' + dur + '回合';
    case 'atk_down':   return '降攻-' + (state.enemyEffects.atk_down_pct || CONFIG.ATK_DOWN_PCT) + '% ' + dur + '回合';
    default: return '';
  }
}

// ========== 执行回合 ==========
function executeTurn() {
  if (G.phase !== 'player' || G.over) return;

  // 折耳猫：晕玩家
  if (G.playerSkipped) {
    G.playerSkipped = false;
    G.phase = 'resolving';
    log('🐱 被晕眩，跳过回合！');
    G.slot = [];
    updateEnemyIntent();
    setTimeout(function() { enemyTurn(); }, 300);
    return;
  }

  // 缅因猫先手：Boss先行动
  if (G.boss && G.boss.id === 'maine_coon') {
    G._maineCoonFirst = true;
    enemyTurn();
    if (G.over) return;
  }

  G.phase = 'resolving';
  log('▶ 回合' + (G.turn+1));
  log('⚔️ 勇者行动');

  G.playerShield = 0;

  // BUG3 FIX: wild_core — find first unlocked slot for wild card
  if (G.wildCoreSlot) {
    var wildIdx = 0;
    while (G.lockedSlots && G.lockedSlots[wildIdx]) wildIdx++;
    if (wildIdx < G.slot.length) {
      if (G.slot[wildIdx] === null) {
        G.slot[wildIdx] = { type: 'wild', id: G.pickedId++, wildCore: true };
      } else {
        G.slot.splice(wildIdx, 0, { type: 'wild', id: G.pickedId++, wildCore: true });
      }
    } else {
      while (G.slot.length < wildIdx) G.slot.push(null);
      G.slot.push({ type: 'wild', id: G.pickedId++, wildCore: true });
    }
  }

  // Boss专属 onResolve（阿比弃牌等）— 使用声明式事件分发
  Zhan.Systems.Boss.processEvent(G, 'RESOLVE');

  var combos = Zhan.Rules.computeCombos(G.slot, G.effectiveMinCombo || CONFIG.MIN_COMBO);

  // 追踪最大连击数
  for (var _ci = 0; _ci < combos.length; _ci++) {
    if (combos[_ci].n > G.maxCombo) G.maxCombo = combos[_ci].n;
  }

  // --- Phase 1: Buff/Debuff ---
  // TASK: FURY_DYNAMIC — fury 实时驱动 effective 值（atkBuffMult / vulnMult / defBuffRatio），
  // 不再在此处静态赋值。dur 不再乘 fury（狂暴核心只影响数值倍率，不影响持续回合）。
  log('  ✨ 缓冲结算...');
  for (var ci = 0; ci < combos.length; ci++) {
    var c = combos[ci];
    if (!BUFF_TYPES[c.type]) continue;
    var mc = G.effectiveMinCombo || CONFIG.MIN_COMBO;
    var dur = c.type === 'stun' ? Zhan.Rules.getStunDuration(c.n, mc) : Zhan.Rules.getComboDuration(c.n, mc);
    dur += G.buffDurationBonus || 0;
    switch (c.type) {
      case 'vulnerable':
        G.enemyEffects.vulnerable = (G.enemyEffects.vulnerable || 0) + dur;
        // effectiveVulnMult 不再静态赋值 — 由 updateEffectiveFuryValues() 实时计算
        log('💔Boss易伤 +' + dur + '→' + G.enemyEffects.vulnerable + '回合');
        break;
      case 'stun':
        G.enemyEffects.stun = (G.enemyEffects.stun || 0) + dur;
        log('💫Boss眩晕 +' + dur + '→' + G.enemyEffects.stun + '回合');
        break;
      case 'atk_buff':
        G.playerEffects.atk_buff = (G.playerEffects.atk_buff || 0) + dur;
        // effectiveAtkBuffMult 不再静态赋值 — 由 updateEffectiveFuryValues() 实时计算
        log('⚡攻击加成 +' + dur + '→' + G.playerEffects.atk_buff + '回合');
        break;
      case 'def_buff':
        G.playerEffects.def_buff = (G.playerEffects.def_buff || 0) + dur;
        // effectiveDefBuffRatio 不再静态赋值 — 由 updateEffectiveFuryValues() 实时计算
        log('💨减伤 +' + dur + '→' + G.playerEffects.def_buff + '回合');
        break;
      case 'atk_down':
        // RULE: FURY_SCOPE — fury 对 atk_down 降攻百分比翻倍
        var atkDownPct = CONFIG.ATK_DOWN_PCT;
        if (G.activeRelics.indexOf('overload_core') >= 0) atkDownPct = 50;
        if (G.furyEnabled && RELICS.fury_core) atkDownPct = Math.min(100, atkDownPct * Zhan.Systems.Relic.getFuryMultiplier(G));
        G.enemyEffects.atk_down_pct = atkDownPct;
        G.enemyEffects.atk_down = (G.enemyEffects.atk_down || 0) + dur;
        log('⬇降攻 +' + dur + '→' + G.enemyEffects.atk_down + '回合');
        break;
    }
  }

  // --- Phase 2: 攻击/防御/回血 ---
  log('  ⚡ 行动结算...');
  var slotTypeCount = {};
  for (var si = 0; si < G.slot.length; si++) {
    var st = Zhan.Rules.resolveWildType(G.slot, si);
    if (!BUFF_TYPES[st] && st !== 'junk') {
      if (!slotTypeCount[st]) slotTypeCount[st] = 0;
      slotTypeCount[st]++;
    }
  }

  var actionMaxLen = {};
  for (var ci2 = 0; ci2 < combos.length; ci2++) {
    var c2 = combos[ci2];
    if (BUFF_TYPES[c2.type]) continue;
    if (!actionMaxLen[c2.type] || c2.n > actionMaxLen[c2.type]) {
      actionMaxLen[c2.type] = c2.n;
    }
  }

  // 结算攻击
  if (slotTypeCount.attack && slotTypeCount.attack >= (G.effectiveMinCombo || CONFIG.MIN_COMBO)) {
    var atkTotal = slotTypeCount.attack;
    var atkMaxLen = actionMaxLen.attack || 0;
    var mc = G.effectiveMinCombo || CONFIG.MIN_COMBO;
    var baseAtk = Zhan.Rules.calcBaseValue(atkTotal, mc);
    var d = Zhan.Rules.calcAttackValue(atkTotal, atkMaxLen, mc);
    if (d > 0) {
      // TASK: FURY_DYNAMIC — 刷新 effective 值后使用（已包含 fury 倍率）
      Zhan.Engine._updateEffectiveFury(G);
      // 使用 effective value（已含 fury 实时倍率）
      d = Zhan.Rules.applyStatusEffects('attack', d, {
        atkBuffMult: G.effectiveAtkBuffMult,
        vulnMult: G.effectiveVulnMult,
        defBuffRatio: G.defBuffRatio
      });
      // 追踪伤害统计
      if (d > G.maxDamage) G.maxDamage = d;
      G.totalDamage += d;
      var pursuitLog = '';
      if (atkMaxLen >= mc + 1) pursuitLog = ' ' + atkMaxLen + '连×' + Zhan.Rules.calcPursuitMultiplier(atkMaxLen, mc).toFixed(1);
      if (G.enemyShield > 0) { var ab = Math.min(G.enemyShield, d); G.enemyShield -= ab; d -= ab; }
      G.enemyHP = Math.max(0, G.enemyHP - d);
      log('🗡×' + atkTotal + '→' + baseAtk + pursuitLog + '→总' + d + ' → ' + G.boss.emoji + G.enemyHP + '🛡' + G.enemyShield);
    }
  }

  // 结算防御
  if (slotTypeCount.defend && slotTypeCount.defend >= (G.effectiveMinCombo || CONFIG.MIN_COMBO)) {
    var defTotal = slotTypeCount.defend;
    var defMaxLen = actionMaxLen.defend || 0;
    var mc = G.effectiveMinCombo || CONFIG.MIN_COMBO;
    var baseDef = Zhan.Rules.calcBaseValue(defTotal, mc);
    var shieldVal = Zhan.Rules.calcDefendValue(defTotal, defMaxLen, mc);
    if (shieldVal > 0) {
      var pursuitLog = '';
      if (defMaxLen >= mc + 1) pursuitLog = ' ' + defMaxLen + '连×' + Zhan.Rules.calcPursuitMultiplier(defMaxLen, mc).toFixed(1);
      G.playerShield += shieldVal;
      log('🛡×' + defTotal + '→' + baseDef + pursuitLog + '→总' + shieldVal + ' 🛡' + G.playerShield);
    }
  }

  // 结算回血
  if (slotTypeCount.heal && slotTypeCount.heal >= (G.effectiveMinCombo || CONFIG.MIN_COMBO)) {
    var healTotal = slotTypeCount.heal;
    var healMaxLen = actionMaxLen.heal || 0;
    var mc = G.effectiveMinCombo || CONFIG.MIN_COMBO;
    var baseHeal = Zhan.Rules.calcBaseValue(healTotal, mc);
    var healVal = Zhan.Rules.calcHealValue(healTotal, healMaxLen, mc);
    if (healVal > 0) {
      var pursuitLog = '';
      if (healMaxLen >= mc + 1) pursuitLog = ' ' + healMaxLen + '连×' + Zhan.Rules.calcPursuitMultiplier(healMaxLen, mc).toFixed(1);
      G.playerHP = Math.min(G.playerMaxHP, G.playerHP + healVal);
      log('❤×' + healTotal + '→' + baseHeal + pursuitLog + '→总' + healVal + ' ❤' + G.playerHP);
    }
  }

  // --- 救命毫毛特殊卡结算（不受连击规则约束，独立结算） ---
  for (var sp = 0; sp < G.slot.length; sp++) {
    var sc = G.slot[sp];
    if (!sc || !sc.special) continue;
    if (sc.type === 'special_atk') {
      var spDmg = sc.special.dmg || 0;
      if (G.enemyShield > 0) { var spAbsorb = Math.min(G.enemyShield, spDmg); G.enemyShield -= spAbsorb; spDmg -= spAbsorb; }
      G.enemyHP = Math.max(0, G.enemyHP - spDmg);
      if (spDmg > G.maxDamage) G.maxDamage = spDmg;
      G.totalDamage += spDmg;
      log('🙈 特攻！→' + (sc.special.dmg || 0) + ' → ' + G.boss.emoji + G.enemyHP + '🛡' + G.enemyShield);
    } else if (sc.type === 'special_def') {
      G.playerShield += (sc.special.shield || 0);
      log('🙉 特防！+🛡' + (sc.special.shield || 0) + ' 🛡' + G.playerShield);
    } else if (sc.type === 'divine') {
      G.playerEffects.divine = 1; // 1回合免伤
      log('🙊 免伤！本回合免疫伤害');
    }
  }

  // --- 未消除惩罚 ---
  if (!G.noUnmatchedPenalty) {
    var claimedSet = {};
    for (var cwi = 0; cwi < combos._claimedWildIndices.length; cwi++) {
      claimedSet[combos._claimedWildIndices[cwi]] = true;
    }
    var unmatchedByType = {};
    for (var si2 = 0; si2 < G.slot.length; si2++) {
      if (!G.slot[si2]) continue; // 跳过 null 占位（锁定槽）
      // 特殊卡不算入未消除惩罚
      if (G.slot[si2].special) continue;
      // 万能牌被连击组消费（claimed=true）不扣血，未参与连击（claimed=false）照扣
      if (G.slot[si2].type === 'wild') {
        if (claimedSet[si2]) continue; // 被消费的万能牌不扣血
        // 未被消费的万能牌照扣1血（当作1张散牌）
        unmatchedByType['wild'] = (unmatchedByType['wild'] || 0) + 1;
        continue;
      }
      var mt = Zhan.Rules.resolveWildType(G.slot, si2);
      if (!unmatchedByType[mt]) unmatchedByType[mt] = 0;
      unmatchedByType[mt]++;
    }
    var unmatchedPenalty = 0;
    for (var ut in unmatchedByType) {
      if (unmatchedByType[ut] < (G.effectiveMinCombo || CONFIG.MIN_COMBO)) {
        unmatchedPenalty += unmatchedByType[ut];
      }
    }
    if (unmatchedPenalty > 0) {
      G.playerHP = Math.max(0, G.playerHP - unmatchedPenalty * CONFIG.UNMATCHED_PENALTY);
      log('♀未消除×' + unmatchedPenalty + '→❤-' + unmatchedPenalty);
    }
  }

  G.slot = [];

  // --- Phase 3: Buff层数衰减 ---
  if ((G.playerEffects.atk_buff || 0) > 0) G.playerEffects.atk_buff--;
  // atk_down 衰减已移至 enemyTurn 末尾（保证先衰减再叠加：
  //   敌回合结束衰减 → 下回合 Phase 1 叠新的 atk_down）

  // BUG1 FIX: Tenacity check AFTER all damage, BEFORE win/lose checks
  if (G.tenacityUsed === false && G.playerHP <= 0) {
    G.playerHP = 1;
    G.tenacityUsed = true;
    log('🛡 坚韧核心触发！HP锁定为1');
  }

  // 检查胜负/元气弹
  if (G.enemyHP <= 0) { endGame(true, G.boss.emoji + ' 击败！'); return; }
  if (G.playerHP <= 0) { endGame(false, '勇者倒下了...'); return; }
  var totalRemaining = 0;
  var fp = flatten(G.piles);
  for (var fi = 0; fi < fp.length; fi++) totalRemaining += fp[fi].length;
  if (totalRemaining === 0) { endGame(true, '✨ 牌库全消！元气弹斩杀！'); return; }

  Zhan.Engine._updateEffectiveFury(G);
  updateEnemyIntent();

  if (G._maineCoonFirst) {
    G._maineCoonFirst = false;
    G.phase = 'player';
    log('⏭ 回合' + (G.turn+1) + '开始');
    log(G.boss.emoji + 'HP:' + G.enemyHP + '🛡' + G.enemyShield + '⚡' + G.enemyPower);
    if (Zhan.UI && Zhan.UI.render) Zhan.UI.render(G);
    updateEnemyIntent();
  } else {
    if (Zhan.UI && Zhan.UI.render) Zhan.UI.render(G);
    setTimeout(function() { enemyTurn(); }, 400);
  }
}

// ========== 辅助：破盾后扣玩家血量 ==========
function applyDamageToPlayer(dmg, rawAtk, label) {
  // 免伤（救命毫毛/divine）：本回合免疫伤害
  if ((G.playerEffects.divine || 0) > 0) {
    log('🙊 免伤抵挡了 ' + rawAtk + ' 伤害！');
    return;
  }
  // TASK: FURY_DYNAMIC — 减伤比率实时随血量，effectiveDefBuffRatio 已包含 fury
  if ((G.playerEffects.def_buff || 0) > 0) {
    Zhan.Engine._updateEffectiveFury(G); // 每次计算前刷新，确保实时随动
    var ratio = G.effectiveDefBuffRatio || CONFIG.DEF_BUFF_RATIO;
    dmg = Math.floor(dmg * ratio);
  }
  // 破盾
  if (G.playerShield > 0) {
    var absorb = Math.min(G.playerShield, dmg);
    G.playerShield -= absorb;
    dmg -= absorb;
  }
  G.playerHP = Math.max(0, G.playerHP - dmg);
  log(label + rawAtk + ' → ❤-' + dmg + '🛡' + G.playerShield);

  // 坚韧核心免死：扣血后触发
  if (G.tenacityUsed === false && G.playerHP <= 0) {
    G.playerHP = 1;
    G.tenacityUsed = true;
    log('🛡 坚韧核心触发！HP锁定为1');
  }
}

// ========== 敌人回合 ==========
function enemyTurn() {
  log(G.boss.emoji + ' ' + G.boss.name + '行动');
  G.enemyShield = 0;

  // T2: BOSS_TURN_REORDER — 哈气→舔毛→眩晕检查→行动

  // 1. 哈气检查（HP跨阈值）
  if (G.boss.hpTriggers) {
    Zhan.Systems.Boss.runHpTriggers(G, 'hiss');
    if (G.over) return;
  }

  // 2. 舔毛检查（每4回合，可清除眩晕）
  if (G.boss.hpTriggers) {
    Zhan.Systems.Boss.runHpTriggers(G, 'groom');
    if (G.over) return;
  }

  // 3. 眩晕检查（舔毛可能已清除眩晕，此时不跳过）
  if ((G.enemyEffects.stun || 0) > 0) {
    log('💫 ' + G.boss.name + '眩晕，跳过回合！');
    G.enemyEffects.stun--;
    if (G.enemyEffects.stun <= 0) G.enemyEffects.stun = 0;
    G.turn++;
    G.phase = 'player';
    log('⏭ 回合' + (G.turn+1) + '开始');
    if (Zhan.UI && Zhan.UI.render) Zhan.UI.render(G);
    updateEnemyIntent();
    return;
  }

  // Boss 专属 onTurnStart（眩晕跳过之后，正常行动之前）
  Zhan.Systems.Boss.processEvent(G, 'TURN_START');
  if (G.over) return;

  // 执行 Boss 行动循环
  var t = G.turn;
  // 8+回合 → 4回快速循环（攻/防/蓄/怒）
  var fastCycle = [
    { type: 'attack' },
    { type: 'defend' },
    { type: 'charge' },
    { type: 'rage' },
  ];
  var useCycle = t >= 7 ? fastCycle : G.boss.cycle;
  var cycle = useCycle[t >= 7 ? (t - 7) % fastCycle.length : t % G.boss.cycle.length];
  var rawAtk = G.boss.baseAtk + G.enemyPower;

  // 降攻效果
  if ((G.enemyEffects.atk_down || 0) > 0) {
    var reduction = G.enemyEffects.atk_down_pct || CONFIG.ATK_DOWN_PCT;
    rawAtk = Math.floor(rawAtk * (1 - reduction/100));
  }

  var shieldVal = 40 + Math.floor(G.enemyPower / 2) * 2; // 初始40，随力量递增

  switch (cycle.type) {
    case 'attack':
      var d = rawAtk;
      applyDamageToPlayer(d, rawAtk, G.boss.emoji + '攻击');
      break;

    case 'defend':
      G.enemyShield += (cycle.shield || shieldVal);
      log(G.boss.emoji + '防御+' + (cycle.shield || shieldVal) + ' 🛡' + G.enemyShield);
      break;

    case 'buff_power':
      G.enemyPower += 2;
      log(G.boss.emoji + '蓄力+2 ⚡' + G.enemyPower);
      break;

    case 'charge':
      log(G.boss.emoji + ' 蓄力中……');
      break;

    case 'rage':
      if (cycle.powerBoost) G.enemyPower += cycle.powerBoost;
      var rageMult = cycle.multiplier || 2;
      var rageDmg = rawAtk * rageMult;
      applyDamageToPlayer(rageDmg, rawAtk * rageMult, G.boss.emoji + '怒击×' + rageMult + (cycle.powerBoost ? ' +⚡' + cycle.powerBoost : '') + '=');
      break;

    case 'double_attack':
      var d2 = rawAtk * 2;
      applyDamageToPlayer(d2, rawAtk * 2, G.boss.emoji + '双重攻击');
      break;

    default:
      log(G.boss.emoji + ' ' + G.boss.name + ' 未定义行动');
  }

  if (G.playerHP <= 0) { endGame(false, '勇者倒下了...'); return; }

  // Boss 专属 onTurnEnd
  Zhan.Systems.Boss.processEvent(G, 'TURN_END');

  // 衰减敌方效果 + 玩家def_buff
  for (var k in G.enemyEffects) {
    if (G.enemyEffects[k] > 0) G.enemyEffects[k]--;
  }
  // atk_down 衰减后清理 pct（atk_down=0 时清除降攻百分比）
  if ((G.enemyEffects.atk_down || 0) <= 0) {
    G.enemyEffects.atk_down = 0;
    G.enemyEffects.atk_down_pct = 0;
  }
  if ((G.playerEffects.def_buff || 0) > 0) G.playerEffects.def_buff--;
  if ((G.playerEffects.divine || 0) > 0) G.playerEffects.divine--; // 免伤衰减

  // 清理 slot 中 null 占位（锁定过期后）
  if (G.lockedSlots) {
    var cleaned = [];
    for (var ci = 0; ci < G.slot.length; ci++) {
      if (G.slot[ci] !== null || (G.lockedSlots && G.lockedSlots[ci])) {
        cleaned.push(G.slot[ci]);
      }
    }
    G.slot = cleaned;
  }

  G.turn++;
  G.phase = 'player';
  Zhan.Engine._updateEffectiveFury(G);
  // 缅因猫：下一回合Boss也先手（在executeTurn开头处理）
  log('⏭ 回合' + (G.turn+1) + '开始');
  log(G.boss.emoji + 'HP:' + G.enemyHP + '🛡' + G.enemyShield + '⚡' + G.enemyPower);
  if (Zhan.UI && Zhan.UI.render) Zhan.UI.render(G);
  updateEnemyIntent();
}

// ========== 无尽模式状态（全局持久） ==========
var ENDLESS_DEFEATED = {}; // { bossId: true }

function endGame(win, msg) {
  G.over = true;
  G.phase = 'over';
  if (Zhan.UI && Zhan.UI.render) Zhan.UI.render(G);

  var overlay = document.getElementById('result-overlay');
  var btnEndless = document.getElementById('btn-endless');

  if (win) {
    // 记录无尽模式已击败Boss
    if (G.isEndless && G.bossId) {
      ENDLESS_DEFEATED[G.bossId] = true;
    }

    G.currentStage = (G.currentStage || 1) + 1;

    if (G.currentStage === 2) {
      // 第一关（毛线团）通过 → 选圣物
      showRelicSelect();
      return;
    }
    if (G.currentStage === 3) {
      // 第二关（猫猫Boss）通过 → 通关！
      overlay.classList.add('show');
      renderStatsPanel(G);
      document.getElementById('result-title').textContent = '🎉 通关！';
      document.getElementById('result-desc').textContent = msg + '（存活' + G.turn + '回合）';
      // 显示两个按钮
      btnEndless.style.display = 'block';
      document.getElementById('btn-restart').textContent = '🔄 再来一局';
      log('🎉通关！' + msg);
      return;
    }
    // currentStage >= 4 → 无尽模式继续（showRelicSelect会经过startNextStage随机猫猫）
    if (G.currentStage >= 4 && G.isEndless) {
      // 检查是否所有猫猫都被击败
      var allCatIds = Object.keys(BOSSES).filter(function(k) { return k !== 'skeleton' && k !== 'catToy'; });
      var allDefeated = allCatIds.every(function(id) { return ENDLESS_DEFEATED[id]; });
      if (allDefeated) {
        overlay.classList.add('show');
        renderStatsPanel(G);
        document.getElementById('result-title').textContent = '🏆 全猫征服！';
        document.getElementById('result-desc').textContent = '所有猫猫Boss已被击败！（存活' + G.turn + '回合）';
        log('🏆 全猫征服！所有猫猫Boss已被击败！');
        btnEndless.style.display = 'none';
        document.getElementById('btn-restart').textContent = '🔄 再来一局';
      } else {
        // 继续无尽：随机下一只没打过的猫
        startEndlessNextCat();
        return;
      }
    }
  } else {
    overlay.classList.add('show');
    renderStatsPanel(G);
    document.getElementById('result-title').textContent = G.boss.emoji + ' 败北';
    document.getElementById('result-desc').textContent = msg + '（存活' + G.turn + '回合）';
    btnEndless.style.display = 'none';
    document.getElementById('btn-restart').textContent = '🔄 再来一局';
    log(G.boss.emoji + '败北 ' + msg);
  }
}

function startEndlessNextCat() {
  var allCatIds = Object.keys(BOSSES).filter(function(k) { return k !== 'skeleton' && k !== 'catToy'; });
  var remaining = allCatIds.filter(function(id) { return !ENDLESS_DEFEATED[id]; });
  if (!remaining.length) {
    endGame(true, '全猫征服！');
    return;
  }
  var bossId = remaining[Math.floor(Math.random() * remaining.length)];
  G.isEndless = true;
  G.activeRelics = G.activeRelics || [];
  G.bossId = bossId;
  G.currentStage = (G.currentStage || 3) + 1;
  log('♾️ 无尽模式·第' + (G.currentStage - 2) + '只猫 — 对手：' + BOSSES[bossId].name + ' ' + BOSSES[bossId].emoji);
  newGame();
}

function updateEnemyIntent() {
  if (G.phase === 'enemy') {
    document.getElementById('enemy-intent').innerHTML = '⏳ 行动中...';
    return;
  }
  if (G.hideIntent) {
    document.getElementById('enemy-intent').innerHTML = '❓ 意图隐藏';
    return;
  }
  var t = G.turn;
  var fastCycle = [{ type: 'attack' },{ type: 'defend' },{ type: 'charge' },{ type: 'rage' }];
  var useCycle = t >= 7 ? fastCycle : G.boss.cycle;
  var cycle = useCycle[t >= 7 ? (t - 7) % fastCycle.length : t % G.boss.cycle.length];
  var atk = G.boss.baseAtk + G.enemyPower;
  var shieldVal = 40 + Math.floor(G.enemyPower / 2) * 2;
  switch (cycle.type) {
    case 'attack':       document.getElementById('enemy-intent').innerHTML = '⚔️ 攻击 ' + atk; break;
    case 'defend':       document.getElementById('enemy-intent').innerHTML = '🛡️ 防御 +' + (cycle.shield || shieldVal); break;
    case 'buff_power':   document.getElementById('enemy-intent').innerHTML = '⚡ 蓄力 +2'; break;
    case 'charge':       document.getElementById('enemy-intent').innerHTML = '⏳ 蓄力'; break;
    case 'rage':         document.getElementById('enemy-intent').innerHTML = '💥 怒击 ' + (atk*2); break;
    case 'double_attack':document.getElementById('enemy-intent').innerHTML = '💥 双重攻击 ' + (atk*2); break;
    default:             document.getElementById('enemy-intent').innerHTML = '❓'; break;
  }

  // 舔毛预告（仅猫猫Boss，提前1回合；哈气不预告）
  var extra = [];
  var hasGroom = G.boss.hpTriggers && G.boss.hpTriggers.indexOf('groom') >= 0;
  if (hasGroom && G.turn > 0 && (G.turn + 1) % 4 === 0) extra.push('🐱舔毛预告');
  if (extra.length) {
    document.getElementById('enemy-intent').innerHTML += ' <span style="font-size:9px;color:#f39c12;">' + extra.join(' ') + '</span>';
  }
}

// ========== 三关流程 & 圣物选择 ==========

var STAGES = [
  { name: '第一关·毛线团', bossId: 'skeleton' },
  { name: '第二关·猫猫Boss', bossId: null }, // 随机
];

function showRelicSelect() {
  var G = Zhan.Engine.state;
  if (!G) return;
  G.relicRerolls = G.relicRerolls || 0;
  G.selectedRelic = null;
  var allRelicIds = Object.keys(RELICS);
  shuffleArray(allRelicIds);
  G.relicOptions = allRelicIds.slice(0, 2);
  renderRelicOptions();
  document.getElementById('relic-select-desc').textContent =
    '第二关通过！获得圣物' + (G.relicRerolls < 1 ? '（可刷新1次）' : '');
  document.getElementById('relic-select-overlay').classList.add('show');
}

function renderRelicOptions() {
  var G = Zhan.Engine.state;
  if (!G) return;
  var el = document.getElementById('relic-select-options');
  el.innerHTML = '';
  for (var oi = 0; oi < G.relicOptions.length; oi++) {
    var relic = RELICS[G.relicOptions[oi]];
    var card = document.createElement('div');
    card.className = 'relic-card';
    card.id = 'relic-opt-' + oi;
    card.innerHTML = '<div class="relic-name">' + relic.name + '</div>' +
      '<div class="relic-type">' + relic.type + '</div>' +
      '<div class="relic-desc">' + relic.desc + '</div>';
    el.appendChild(card);
  }
}

// 刷新按钮 — 换一组圣物
(function() {
  var btn = document.getElementById('btn-relic-reroll');
  btn.addEventListener('click', function() {
    var allRelicIds = Object.keys(RELICS);
    shuffleArray(allRelicIds);
    G.relicOptions = allRelicIds.slice(0, 2);
    renderRelicOptions();
    if (G.relicRerolls < 1) {
      G.relicRerolls++;
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.textContent = '🔄 刷新（已用完）';
      document.getElementById('relic-select-desc').textContent = '第二关通过！获得圣物';
    }
  });
})();

// 确认按钮 — 两个圣物全拿
(function() {
  var btn = document.getElementById('btn-relic-confirm');
  btn.addEventListener('click', function() {
    G.activeRelics = G.activeRelics || [];
    for (var i = 0; i < G.relicOptions.length; i++) {
      G.activeRelics.push(G.relicOptions[i]);
      log('🎁 获得圣物：' + RELICS[G.relicOptions[i]].name + ' — ' + RELICS[G.relicOptions[i]].desc);
    }
    document.getElementById('relic-select-overlay').classList.remove('show');
    startNextStage();
  });
})();

function startNextStage() {
  var G = Zhan.Engine.state;
  if (!G) return;
  var stageIdx = G.currentStage - 1;
  if (stageIdx >= STAGES.length) return;
  var stage = STAGES[stageIdx];
  var bossId = stage.bossId;
  if (!bossId) {
    var catIds = Object.keys(BOSSES).filter(function(k) { return k !== 'skeleton' && k !== 'catToy'; });
    bossId = catIds[Math.floor(Math.random() * catIds.length)];
  }
  G.bossId = bossId;
  log('🏁 ' + stage.name + ' — 对手：' + BOSSES[bossId].name + ' ' + BOSSES[bossId].emoji);
  newGame();
}

</script>
<script>
// ============================================================
//  斩 v14 — ui.js
//  渲染函数 + DOM 事件 + log 系统
//  依赖 data.js / core.js（先加载）
// ============================================================

if (!window.Zhan) window.Zhan = {};

// ========== 渲染主函数 ==========
Zhan.UI = {};

Zhan.UI.render = function(state) {
  // TASK: FURY_DYNAMIC — effective 值已由 Engine._updateEffectiveFury 在 phase 结束时计算好，render 只读不写
  var G = state || Zhan.Engine.state;
  if (!G) return;
  document.getElementById('player-hp').textContent = G.playerHP;
  document.getElementById('player-shield').textContent = G.playerShield;
  document.getElementById('enemy-hp').textContent = G.enemyHP;
  document.getElementById('enemy-shield').textContent = G.enemyShield;
  document.getElementById('enemy-power').textContent = G.enemyPower;
  document.getElementById('enemy-avatar').textContent = G.boss.emoji || '🧶';
  document.getElementById('enemy-name').textContent = G.boss.name || '毛线团';

  // 元气弹进度
  var totalCards = 0;
  for (var k in G.deckConfig) totalCards += G.deckConfig[k];
  var remaining = 0;
  var fp = flatten(G.piles);
  for (var i = 0; i < fp.length; i++) remaining += fp[i].length;
  remaining += G.slot.length;
  var consumed = totalCards - remaining;
  var spiritPct = Math.floor(consumed / totalCards * 100);
  document.getElementById('spirit-bar-inner').style.width = spiritPct + '%';
  document.getElementById('spirit-text').textContent = spiritPct + '%';

  // 玩家badges
  var pe = G.playerEffects;
  var pbHtml = '';
  if ((pe.atk_buff || 0) > 0) {
    var abm = G.effectiveAtkBuffMult || CONFIG.ATK_BUFF_MULT;
    // T3: 去尾零 — 1.50→1.5
    pbHtml += '<span class="badge badge-atk-up">⚡攻×' + parseFloat(abm.toFixed(2)) + ' ' + pe.atk_buff + 'T</span>';
  }
  if ((pe.def_buff || 0) > 0) {
    var dbr = G.effectiveDefBuffRatio || CONFIG.DEF_BUFF_RATIO;
    // T3: 去尾零 — 0.70→0.7
    pbHtml += '<span class="badge badge-def-up">💨减伤×' + parseFloat(dbr.toFixed(2)) + ' ' + pe.def_buff + 'T</span>';
  }
  document.getElementById('player-badges').innerHTML = pbHtml;

  // 敌人badges
  var ee = G.enemyEffects;
  var ebHtml = '';
  if ((ee.stun || 0) > 0) ebHtml += '<span class="badge badge-stun">💫眩晕 ' + ee.stun + 'T</span>';
  if ((ee.vulnerable || 0) > 0) ebHtml += '<span class="badge badge-vuln">💔易伤 ' + ee.vulnerable + 'T</span>';
  // T3: 降攻百分比动态取值
  if ((ee.atk_down || 0) > 0) ebHtml += '<span class="badge badge-atk-down">⬇降攻-' + (ee.atk_down_pct || CONFIG.ATK_DOWN_PCT) + '% ' + ee.atk_down + 'T</span>';
  document.getElementById('enemy-badges').innerHTML = ebHtml;

  // 牌堆统计
  var totalRemaining = 0;
  for (var i2 = 0; i2 < fp.length; i2++) totalRemaining += fp[i2].length;
  document.getElementById('deck-remain').textContent = totalRemaining;
  var hiddenCount = 0, visibleCount = 0;
  for (var i3 = 0; i3 < fp.length; i3++) {
    var pile = fp[i3];
    if (!pile.length) continue;
    visibleCount++;
    if (pile.length > 1) hiddenCount += pile.length - 1;
  }
  document.getElementById('hidden-cards').textContent = hiddenCount;
  document.getElementById('visible-cards').textContent = visibleCount;

  Zhan.UI.renderBoard(G);
  Zhan.UI.renderSlot(G);

  var btn = document.getElementById('btn-end-turn');
  if (G.phase === 'player' && !G.over && G.slot.length > 0) btn.disabled = false;
  else btn.disabled = true;
};

// Legacy render for backward compat

// ========== 牌堆渲染 ==========
Zhan.UI.renderBoard = function(state) {
  var G = state;
  var board = document.getElementById('board');
  board.innerHTML = '';
  var flatPiles = flatten(G.piles);
  for (var r = 0; r < CONFIG.BOARD_ROWS; r++) {
    for (var c = 0; c < CONFIG.BOARD_COLS; c++) {
      (function(r, c) {
        var pile = G.piles[r][c];
        var top = getTop(pile);
        var div = document.createElement('div');
        div.className = 'card-slot';
        var flatIdx = r * CONFIG.BOARD_COLS + c;

        // 锁定检查
        if (G.lockedPiles && G.lockedPiles[flatIdx]) div.classList.add('locked');

        if (!top) { div.classList.add('card-empty'); board.appendChild(div); return; }

        // 涂抹检查：显示❓遮盖
        var ct;
        var isSmeared = G.smearedPiles && G.smearedPiles[flatIdx];
        if (isSmeared) {
          ct = { emoji: '❓', label: '??', cssClass: 'card-junk' };
        } else {
          ct = CARD_TYPES[top.type] || { emoji: '⬜', label: '废牌', cssClass: 'card-junk' };
        }
        // 救命毫毛特殊卡：白色卡面，覆盖样式（保持 CARD_TYPES 定义的 cssClass）
        var isSpecial = top.special && top.special.color === 'white';
        if (isSpecial) {
          ct = { emoji: top.special.emoji, label: top.special.label, cssClass: ct.cssClass };
        }
        var inner = document.createElement('div');
        inner.className = 'card ' + ct.cssClass;
        // 特殊卡白色卡面
        if (isSpecial) {
          inner.style.background = '#fff';
          inner.style.color = '#333';
          inner.style.border = '1px solid #ddd';
        }
        // 涂抹卡牌：灰色卡面
        if (isSmeared) {
          inner.style.background = '#555';
          inner.style.color = '#ccc';
          inner.style.border = '1px solid #666';
        }
        var icon = document.createElement('span');
        icon.className = 'card-icon';
        icon.textContent = ct.emoji;
        var label = document.createElement('span');
        label.className = 'card-label';
        label.textContent = ct.label;
        inner.appendChild(icon);
        inner.appendChild(label);
        div.appendChild(inner);

        if (pile.length > 1) {
          var sc = document.createElement('div');
          sc.className = 'stack-count';
          sc.textContent = pile.length;
          div.appendChild(sc);
        }

        // 双击进槽
        var lastTap = 0;
        div.addEventListener('click', function(e) {
          var st = Zhan.Engine.state;
          if (!st || st.phase !== 'player' || st.over) return;
          var now = Date.now();
          if (now - lastTap < CONFIG.DOUBLE_TAP_DELAY) { e.preventDefault(); Zhan.Engine.dispatch({ type: 'PLAY_CARD', r: r, c: c }); lastTap = 0; return; }
          lastTap = now;
          if (st.piles[r][c] && st.piles[r][c].length) { div.classList.add('double-tap-active'); setTimeout(function() { div.classList.remove('double-tap-active'); }, 200); }
        });

        // 拖拽进槽
        var touchStartY = 0, touchStartX = 0, swiping = false;
        div.addEventListener('touchstart', function(e) {
          touchStartY = e.touches[0].clientY; touchStartX = e.touches[0].clientX; swiping = false;
        }, {passive: true});
        div.addEventListener('touchmove', function(e) {
          var st = Zhan.Engine.state;
          if (!st || st.phase !== 'player' || st.over) return;
          var dy = e.touches[0].clientY - touchStartY;
          var dx = Math.abs(e.touches[0].clientX - touchStartX);
          if (dy > CONFIG.SWIPE_THRESHOLD && dy > dx * 1.5) { e.preventDefault(); if (!swiping && st.piles[r][c] && st.piles[r][c].length) { swiping = true; Zhan.Engine.dispatch({ type: 'PLAY_CARD', r: r, c: c }); } }
        }, {passive: false});

        board.appendChild(div);
      })(r, c);
    }
  }
};

Zhan.UI.renderSlot = function(state) {
  var G = state;
  var bar = document.getElementById('slot-bar');
  bar.innerHTML = '';
  var effectiveSize = G.effectiveSlotSize || CONFIG.SLOT_SIZE;
  var wildCoreIdx = -1;
  if (G.wildCoreSlot) {
    wildCoreIdx = 0;
    while (wildCoreIdx < effectiveSize && G.lockedSlots && G.lockedSlots[wildCoreIdx]) wildCoreIdx++;
  }
  for (var i = 0; i < effectiveSize; i++) {
    var div = document.createElement('div');
    div.className = 'eslot';
    // 万能核心槽位：动态查找第一个非锁定槽位
    if (G.wildCoreSlot && i === wildCoreIdx) {
      div.classList.add('filled', 'wild-core');
      div.textContent = '💎';
      var wcLabel = document.createElement('span');
      wcLabel.className = 'wild-core-label';
      wcLabel.textContent = '万能';
      div.appendChild(wcLabel);
    } else if (G.lockedSlots && G.lockedSlots[i]) {
      div.classList.add('locked');
      div.textContent = '✕';
    } else if (i < G.slot.length && G.slot[i] !== null) {
      var card = G.slot[i];
      // 特殊救命毫毛卡
      if (card.special) {
        div.classList.add('filled', 'special');
        div.style.background = '#fff';
        div.style.color = '#333';
        div.textContent = card.special.emoji;
      } else {
        var ct = CARD_TYPES[card.type] || { emoji: '⬜', color: 'junk' };
        div.classList.add('filled', ct.color);
        div.textContent = ct.emoji;
      }
    }
    bar.appendChild(div);
  }
};

// ========== 连击预览 ==========
Zhan.UI.updateComboPreview = function(state) {
  var G = state || Zhan.Engine.state;
  if (!G) return;
  var combos = Zhan.Rules.computeCombos(G.slot, G.effectiveMinCombo || CONFIG.MIN_COMBO);
  var el = document.getElementById('combo-bar');
  if (!combos.length && !G.slot.length) { el.innerHTML = ''; return; }

  var slotTypeCount = {};
  for (var si = 0; si < G.slot.length; si++) {
    var st = Zhan.Rules.resolveWildType(G.slot, si);
    if (!BUFF_TYPES[st] && st !== 'junk') {
      if (!slotTypeCount[st]) slotTypeCount[st] = 0;
      slotTypeCount[st]++;
    }
  }

  var actionMaxLen = {};
  for (var ci = 0; ci < combos.length; ci++) {
    var c = combos[ci];
    if (BUFF_TYPES[c.type]) continue;
    if (!actionMaxLen[c.type] || c.n > actionMaxLen[c.type]) {
      actionMaxLen[c.type] = c.n;
    }
  }

  var previewParts = [];
  var ACTION_TYPES = ['attack', 'defend', 'heal'];
  for (var ai = 0; ai < ACTION_TYPES.length; ai++) {
    var at = ACTION_TYPES[ai];
    if (!slotTypeCount[at] || slotTypeCount[at] < (G.effectiveMinCombo || CONFIG.MIN_COMBO)) continue;
    var total = slotTypeCount[at];
    var maxLen = actionMaxLen[at] || 0;
    var mc = G.effectiveMinCombo || CONFIG.MIN_COMBO;
    var baseVal = Zhan.Rules.calcBaseValue(total, mc);
    var val = at === 'attack' ? Zhan.Rules.calcAttackValue(total, maxLen, mc) : (at === 'defend' ? Zhan.Rules.calcDefendValue(total, maxLen, mc) : Zhan.Rules.calcHealValue(total, maxLen, mc));
    var emoji = CARD_TYPES[at].emoji;
    var html = '<span class="combo-preview ' + at + '">' + emoji + '×' + total + '→' + baseVal;
    if (maxLen >= mc + 1) {
      // T3: 去尾零 — 1.0→1, 1.5→1.5
      var mult = Zhan.Rules.calcPursuitMultiplier(maxLen, mc);
      html += ' ' + maxLen + '连×' + parseFloat(mult.toFixed(1));
    }
    html += '→总' + val + '</span>';
    previewParts.push(html);
  }

  for (var ci2 = 0; ci2 < combos.length; ci2++) {
    var c2 = combos[ci2];
    if (!BUFF_TYPES[c2.type]) continue;
    Zhan.Engine._updateEffectiveFury(G);
    var desc = getEffectDescription(G, c2.type, c2.n);
    previewParts.push('<span class="combo-preview ' + c2.type + '">' + CARD_TYPES[c2.type].emoji + c2.n + '连→' + desc + '</span>');
  }

  // 未消除扣血预览（与 core.js 改动4对齐：被消费的万能牌不扣血，未消费的照扣）
  var claimedSet2 = {};
  for (var cwi2 = 0; cwi2 < combos._claimedWildIndices.length; cwi2++) {
    claimedSet2[combos._claimedWildIndices[cwi2]] = true;
  }
  var unmatchedByType = {};
  for (var si2 = 0; si2 < G.slot.length; si2++) {
    if (!G.slot[si2] || G.slot[si2].special) continue;
    // 万能牌：被连击组消费的跳过，未消费的扣1血
    if (G.slot[si2].type === 'wild') {
      if (claimedSet2[si2]) continue;
      unmatchedByType['wild'] = (unmatchedByType['wild'] || 0) + 1;
      continue;
    }
    var mt = Zhan.Rules.resolveWildType(G.slot, si2);
    if (!unmatchedByType[mt]) unmatchedByType[mt] = 0;
    unmatchedByType[mt]++;
  }
  for (var ut in unmatchedByType) {
    if (unmatchedByType[ut] >= (G.effectiveMinCombo || CONFIG.MIN_COMBO)) continue;
    var uct = CARD_TYPES[ut] || { emoji: '⬜' };
    previewParts.push('<span class="combo-none">' + uct.emoji + '×' + unmatchedByType[ut] + '→❤-' + unmatchedByType[ut] + '</span>');
  }

  el.innerHTML = previewParts.length ? previewParts.join(' ') : '<span class="combo-none">⚪ 未形成连击</span>';
};

// Legacy compat
function updateComboPreview() { Zhan.UI.updateComboPreview(Zhan.Engine.state || G); }

// ========== 结算面板 ==========
Zhan.UI.renderStatsPanel = function(state) {
  var G = state;
  var panel = document.getElementById('stats-panel');
  if (!panel) return;

  var relicNames = G.activeRelicNames || [];
  var relicsHtml = '';
  if (relicNames.length) {
    relicsHtml = '<div class="stat-row-item"><span class="stat-label">🏆 圣物</span><span class="stat-value">' + relicNames.join(', ') + '</span></div>';
  }

  var totalDeck = 0;
  for (var k in G.deckConfig) totalDeck += G.deckConfig[k];
  var remaining = 0;
  var fp = flatten(G.piles);
  for (var fi = 0; fi < fp.length; fi++) remaining += fp[fi].length;
  var consumed = totalDeck - remaining;

  panel.innerHTML =
    '<div class="stats-card">' +
      '<div class="stat-row-item"><span class="stat-label">⏱ 存活回合</span><span class="stat-value">' + (G.turn + 1) + '</span></div>' +
      '<div class="stat-row-item"><span class="stat-label">❤️ 剩余HP</span><span class="stat-value">' + G.playerHP + ' / ' + G.playerMaxHP + '</span></div>' +
      '<div class="stat-row-item"><span class="stat-label">💥 最高单次伤害</span><span class="stat-value">' + G.maxDamage + '</span></div>' +
      '<div class="stat-row-item"><span class="stat-label">🔥 最高连击</span><span class="stat-value">' + G.maxCombo + ' 连</span></div>' +
      '<div class="stat-row-item"><span class="stat-label">⚔️ 总伤害输出</span><span class="stat-value">' + G.totalDamage + '</span></div>' +
      '<div class="stat-row-item"><span class="stat-label">🃏 消耗卡牌数</span><span class="stat-value">' + consumed + ' / ' + totalDeck + '</span></div>' +
      relicsHtml +
    '</div>';
};

// ========== LOG ==========
function log(msg) {
  var G = Zhan.Engine.state;
  if (!G) return;
  if (!G.logLines) G.logLines = [];
  G.logLines.push(msg);
  if (G.logLines.length > CONFIG.LOG_MAX_LINES) G.logLines.shift();
  var el = document.getElementById('log');
  // 逐行用 textContent 防止 XSS
  el.innerHTML = '';
  for (var i = 0; i < G.logLines.length; i++) {
    var line = document.createElement('div');
    line.textContent = G.logLines[i];
    el.appendChild(line);
  }
  el.scrollTop = el.scrollHeight;
}

  }, {passive: true});
  el.addEventListener('touchend', function() { clearTimeout(timer); });
  el.addEventListener('touchmove', function() { clearTimeout(timer); });
  el.addEventListener('contextmenu', function(e) { e.preventDefault(); showPlayerRelicInfo(); });
})();

function showPlayerRelicInfo() {
  var G = Zhan.Engine.state;
  if (!G) return;
  var relics = G.activeRelics || [];
  var desc = relics.length ? '' : '（未装配圣物）';
  for (var i = 0; i < relics.length; i++) {
    var relic = RELICS[relics[i]];
    if (relic) desc += (i ? '\n' : '') + relic.name + ': ' + relic.desc;
  }
  document.getElementById('player-info-mechanic').textContent = desc;
  document.getElementById('player-info-stats').textContent =
    'HP ' + G.playerHP + '/' + G.playerMaxHP + ' | ⚡ ' + (G.effectiveMinCombo || CONFIG.MIN_COMBO) + '连起效';
  document.getElementById('player-info-overlay').style.display = 'flex';
}

  assert: function(cond, msg) {
    if (!cond) { console.error('FAIL: ' + msg); throw new Error(msg); }
  },
  run: function() {
    console.log('=== Zhan Regression Test ===');
    // Rules 测试
    this.assert(Zhan.Rules.calcBaseValue(5, 3) === 8, 'calcBaseValue');

    // Engine 集成测试
    Zhan.Engine.init();
    this.assert(Zhan.Engine.state.playerHP === 100, 'init HP');
    this.assert(Zhan.Engine.state.bossId === 'skeleton', 'init boss');
    // UI 单向化测试：dispatch 正常
    Zhan.Engine.dispatch({ type: 'END_TURN' });
    this.assert(Zhan.Engine.state.turn >= 1, 'END_TURN dispatch works');
    // 重置
    Zhan.Engine.dispatch({ type: 'RESET' });
    this.assert(Zhan.Engine.state.turn === 0, 'RESET dispatch works');
    console.log('=== All Tests Passed ===');
  }
};

  setTimeout(function() { Zhan.Test.run(); }, 800);
}
