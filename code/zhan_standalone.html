// ========== 连击预览 ==========
Zhan.UI.updateComboPreview = function(state) {
  var st = state || Zhan.Engine.state;
  if (!st) return;
  var combos = Zhan.Rules.computeCombos(st.slot, st.effectiveMinCombo || CONFIG.MIN_COMBO);
  var el = document.getElementById('combo-bar');
  if (!el) return;
  if (!combos.length && !st.slot.length) { el.innerHTML = ''; return; }

  var slotTypeCount = {};
  for (var si = 0; si < st.slot.length; si++) {
    var cardType = Zhan.Rules.resolveWildType(st.slot, si);
    if (!BUFF_TYPES[cardType] && cardType !== 'junk') {
      if (!slotTypeCount[cardType]) slotTypeCount[cardType] = 0;
      slotTypeCount[cardType]++;
    }
  }

  var actionMaxLen = {};
  for (var ci = 0; ci < combos.length; ci++) {
    var c = combos[ci];
    if (BUFF_TYPES[c.type]) continue;
    if (!actionMaxLen[c.type] || c.n > actionMaxLen[c.type]) {
      actionMaxLen[c.type] = c.n;
    }
  }

  // 先刷新 fury，让 buff 倍率反映当前 HP
  Zhan.Engine._updateEffectiveFury(st);

  var previewParts = [];
  var ACTION_TYPES = ['attack', 'defend', 'heal'];
  for (var ai = 0; ai < ACTION_TYPES.length; ai++) {
    var at = ACTION_TYPES[ai];
    if (!slotTypeCount[at] || slotTypeCount[at] < (st.effectiveMinCombo || CONFIG.MIN_COMBO)) continue;
    var total = slotTypeCount[at];
    var maxLen = actionMaxLen[at] || 0;
    var mc = st.effectiveMinCombo || CONFIG.MIN_COMBO;
    var baseVal = Zhan.Rules.calcBaseValue(total, mc);
    var val = at === 'attack' ? Zhan.Rules.calcAttackValue(total, maxLen, mc) : (at === 'defend' ? Zhan.Rules.calcDefendValue(total, maxLen, mc) : Zhan.Rules.calcHealValue(total, maxLen, mc));
    // 攻击受暴击/破甲加成（与回合结束结算一致）
    if (at === 'attack' && val > 0) {
      val = Zhan.Rules.applyStatusEffects('attack', val, { atkBuffMult: st.effectiveAtkBuffMult, vulnMult: st.effectiveVulnMult, defBuffRatio: st.defBuffRatio });
    }
    var emoji = CARD_TYPES[at].emoji;
    var html = '<span class="combo-preview ' + at + '">' + emoji + '×' + total + '→' + val + '</span>';
    previewParts.push(html);
  }

  for (var ci2 = 0; ci2 < combos.length; ci2++) {
    var c2 = combos[ci2];
    if (!BUFF_TYPES[c2.type]) continue;
    var desc = Zhan.Rules.getEffectDescription(st, c2.type, c2.n);
    previewParts.push('<span class="combo-preview ' + c2.type + '">' + CARD_TYPES[c2.type].emoji + c2.n + '连→' + desc + '</span>');
  }

  var activeComboTypes = [];
  for (var _cbi2 = 0; _cbi2 < combos.length; _cbi2++) {
    if (BUFF_TYPES[combos[_cbi2].type]) activeComboTypes.push(combos[_cbi2].type);
  }
  var penaltyResult = Zhan.Rules.computeUnmatchedPenalty({
    slot: st.slot,
    _claimedWildIndices: combos._claimedWildIndices,
    effectiveMinCombo: st.effectiveMinCombo,
    activeComboTypes: activeComboTypes
  });
  for (var ut in penaltyResult.unmatchedByType) {
    if (penaltyResult.unmatchedByType[ut] >= (st.effectiveMinCombo || CONFIG.MIN_COMBO)) continue;
    var uct = CARD_TYPES[ut] || { emoji: '⬜' };
    previewParts.push('<span class="combo-none">' + uct.emoji + '×' + penaltyResult.unmatchedByType[ut] + '→❤-' + penaltyResult.unmatchedByType[ut] + '</span>');
  }

  el.innerHTML = previewParts.length ? previewParts.join(' ') : '<span class="combo-none">⚪ 未形成连击</span>';
};

// ========== 圣物选择渲染 ==========
Zhan.UI.renderRelicSelect = function(state) {
  var st = state;
  if (!st) return;

  if (!this._relicSelectStyleInjected) {
    this._relicSelectStyleInjected = true;
    var styleEl = document.createElement('style');
    styleEl.textContent = '.relic-card.selected { border-color: #f1c40f !important; box-shadow: 0 0 10px rgba(241,196,15,0.5); }';
    document.head.appendChild(styleEl);
  }

  var isTower = st.mode === CONFIG.MODE_TOWER;

  var optionsEl = document.getElementById('relic-select-options');
  optionsEl.innerHTML = '';
  var opts = st.relicOptions || [];
  for (var oi = 0; oi < opts.length; oi++) {
    var relic = RELICS[opts[oi]];
    var card = document.createElement('div');
    card.className = 'relic-card';
    if (isTower && st.selectedRelic === opts[oi]) {
      card.classList.add('selected');
    }
    card.id = 'relic-opt-' + oi;
    card.innerHTML = '<div class="relic-name">' + relic.name + '</div>' +
      '<div class="relic-type">' + relic.type + '</div>' +
      '<div class="relic-desc">' + relic.desc + '</div>';
    optionsEl.appendChild(card);
  }

  var maxRerolls = 1 + (Zhan.Save.hasPurchase('extra_reroll') ? 1 : 0);
  var rerolls = st.relicRerolls || 0;
  var canReroll = rerolls < maxRerolls;
  if (isTower) {
    document.getElementById('relic-select-desc').textContent =
      '点击选中1个圣物' + (canReroll ? '（可刷新' + (maxRerolls - rerolls) + '次）' : '');
  } else {
    document.getElementById('relic-select-desc').textContent =
      '第二关通过！获得圣物' + (canReroll ? '（可刷新' + (maxRerolls - rerolls) + '次）' : '');
  }

  var btnReroll = document.getElementById('btn-relic-reroll');
  if (!canReroll) {
    btnReroll.disabled = true;
    btnReroll.style.opacity = '0.4';
    btnReroll.textContent = '🔄 刷新（已用完）';
  } else {
    btnReroll.disabled = false;
    btnReroll.style.opacity = '1';
    btnReroll.textContent = '🔄 刷新';
  }

  var btnConfirm = document.getElementById('btn-relic-confirm');
  if (isTower) {
    btnConfirm.textContent = st.selectedRelic ? '✅ 确认选择' : '✅ 请先点击选择圣物';
    btnConfirm.disabled = !st.selectedRelic;
    btnConfirm.style.opacity = st.selectedRelic ? '1' : '0.4';
  } else {
    btnConfirm.textContent = '✅ 确认（全拿）';
    btnConfirm.disabled = false;
    btnConfirm.style.opacity = '1';
  }

  document.getElementById('relic-select-overlay').classList.add('show');
};

    var canBuy = !owned && !maxed && Zhan.Save.canAfford(item.price);
    var label = item.name;
    if (item.maxLevel) label += ' Lv.' + level + '/' + item.maxLevel;
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:#0f3460;border-radius:6px;font-size:11px;">';

      var chosen = Zhan.Save.get('catMaoAffinityRelic', '');
      html += '<button data-shop-affinity style="padding:4px 10px;border:none;border-radius:4px;background:#8e44ad;color:#fff;font-size:11px;cursor:pointer;">' + (chosen ? '已选：' + ((RELICS[chosen] && RELICS[chosen].name) || chosen) : '选择圣物') + '</button>';
    } else if (owned || maxed) {
      html += '<span style="color:#2ecc71;font-weight:bold;font-size:12px;">✅ 已拥有</span>';
    } else {
      html += '<button data-shop-buy="' + item.id + '" style="padding:4px 10px;border:none;border-radius:4px;background:' + (canBuy ? '#e67e22' : '#555') + ';color:' + (canBuy ? '#fff' : '#888') + ';font-size:11px;cursor:' + (canBuy ? 'pointer' : 'default') + ';" ' + (canBuy ? '' : 'disabled') + '>' + item.price + ' 🐱</button>';

<script>
// 启动脚本 — 必须在 ui.js 之后执行（此时 Zhan.UI 已定义）
window.Zhan = window.Zhan || {};
window.Zhan.Settings = { musicVolume: 0.5, sfxVolume: 0.5, vibrate: true };
Zhan.Save.load();
Zhan.UI.renderMainMenu();

// ========== 画面震动系统 ==========
Zhan.Shake = {
  // [伤害阈值, 震幅px, 时长ms, 频率Hz, 衰减曲线]
  TIERS: [
    [60, 5, 180, 12, 'exp'],
    [45, 3, 120, 14, 'exp'],
    [30, 2,  90, 16, 'exp'],
    [20, 1,  60, 18, 'linear'],
  ],
  HITSTOP: [ [60,240], [45,160], [30,100], [20,60] ],
  BOSS_AMP_MULT: 1.25,
  BOSS_DUR_MULT: 1.1,
  directionX: 1,
  _running: false,

  _decay: function(progress, type) {
    switch (type) {
      case 'linear': return 1 - progress;
      case 'exp':    return Math.exp(-3 * progress);
      default:       return 1 - progress;
    }
  },

  hitstopMs: function(dmg) {
    for (var i = 0; i < Zhan.Shake.HITSTOP.length; i++) {
      if (dmg >= Zhan.Shake.HITSTOP[i][0]) return Zhan.Shake.HITSTOP[i][1];
    }
    return 0;
  },

  trigger: function(dmg, isBoss) {
    if (!Zhan.Settings.vibrate) return;
    if (this._running) return;

    var tier = null;
    for (var i = 0; i < this.TIERS.length; i++) {
      if (dmg >= this.TIERS[i][0]) { tier = this.TIERS[i]; break; }
    }
    if (!tier) return;

    var amp   = tier[1];
    var dur   = tier[2];
    var freq  = tier[3];
    var decay = tier[4];

    if (isBoss) {
      amp *= this.BOSS_AMP_MULT;
      dur *= this.BOSS_DUR_MULT;
    }

    // 最高档闪白
    if (tier === this.TIERS[0]) {
      document.body.classList.add('damage-flash');
      setTimeout(function() { document.body.classList.remove('damage-flash'); }, 50);
    }

    var el = document.getElementById('camera-layer');
    var self = this;
    var start = performance.now();
    this._running = true;

    function tick(now) {
      var elapsed = now - start;
      if (elapsed >= dur) {
        el.style.transform = 'translateX(0px)';
        self._running = false;
        return;
      }
      var progress = elapsed / dur;
      var mag = amp * self._decay(progress, decay);
      var osc = Math.sin(2 * Math.PI * freq * elapsed / 1000);
      var offset = mag * osc * self.directionX;
      el.style.transform = 'translateX(' + offset.toFixed(2) + 'px)';
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  }
};

// ========== BGM 预加载（立即开始，不等首次点击） ==========
// 必须赶在任何按钮事件之前启动加载，否则冒泡顺序导致按钮 handler

// ========== 浏览器内回归测试 ==========
Zhan.Test = {
  assert: function(cond, msg) {
    if (!cond) { console.error('FAIL: ' + msg); throw new Error(msg); }
  },
  assertDeepEqual: function(a, b, msg) {
    var sa = JSON.stringify(a);
    var sb = JSON.stringify(b);
    if (sa !== sb) { console.error('FAIL: ' + msg + ' | expected ' + sb + ' got ' + sa); throw new Error(msg); }
  },
  mockState: function(overrides) {
    var base = {
      playerHP: 100, playerMaxHP: 100, enemyHP: 300, enemyMaxHP: 300,
      effectiveMinCombo: CONFIG.MIN_COMBO, effectiveSlotSize: CONFIG.SLOT_SIZE,
      effectiveAtkBuffMult: 0, effectiveVulnMult: 0, buffDurationBonus: 0,
      playerEffects: {}, enemyEffects: {}, tenacityUsed: false, furyEnabled: false,
      noUnmatchedPenalty: false, deckConfig: JSON.parse(JSON.stringify(DECK_SIZES)),
      activeRelics: [], wildCoreSlot: false,
      boss: { id: 'tabby', name: '狸花猫', emoji: '🐱', hpTriggers: ['groom', 'hiss'],
        maxHP: 300, baseAtk: 24, traits: [], cycle: BOSS_CYCLE_TEMPLATE },
      lockedSlots: {}
    };
    for (var k in overrides) base[k] = overrides[k];

  },
  run: function() {
    console.log('=== Zhan Regression Test ===');
    console.log('--- Zhan.Rules ---');
    var T = this;
    T.assert(Zhan.Rules.calcBaseValue(5, 3) === 8, 'calcBaseValue');
    T.assert(Zhan.Rules.resolveWildType([{ type: 'attack' }, { type: 'wild' }], 1) === 'attack', 'resolveWildType left');
    console.log('--- Engine ---');
    Zhan.Engine.init();
    T.assert(Zhan.Engine.state.playerHP === 100, 'init HP');
    T.assert(Zhan.Engine.state.bossId === 'skeleton', 'init boss');
    Zhan.Engine.dispatch({ type: 'END_TURN' });
    T.assert(Zhan.Engine.state.turn >= 1, 'END_TURN dispatch works');
    Zhan.Engine.dispatch({ type: 'RESET' });
    T.assert(Zhan.Engine.state.turn === 0, 'RESET dispatch works');
    console.log('--- slot_plus2 + wild_core ---');
    (function() {
      var g1 = T.mockState();
      Zhan.Systems.Relic._handlers.increaseSlotSize(g1, { amount: 2 });
      T.assert(g1.effectiveSlotSize === 12, 'slot_plus2 alone → 12');
      var g2 = T.mockState();
      Zhan.Systems.Relic._handlers.enableWildCoreSlot(g2);
      T.assert(g2.effectiveSlotSize === 11, 'wild_core alone → 11');
      T.assert(g2.wildCoreSlot === true, 'wild_core flag set');
      var g3 = T.mockState();
      Zhan.Systems.Relic._handlers.enableWildCoreSlot(g3);
      Zhan.Systems.Relic._handlers.increaseSlotSize(g3, { amount: 2 });
      T.assert(g3.effectiveSlotSize === 13, 'wild_core+slot_plus2 → 13');
      var g4 = T.mockState();
      Zhan.Systems.Relic._handlers.increaseSlotSize(g4, { amount: 2 });
      Zhan.Systems.Relic._handlers.enableWildCoreSlot(g4);
      T.assert(g4.effectiveSlotSize === 13, 'slot_plus2+wild_core → 13');
    })();
    console.log('--- computeCombos wild ---');
    (function() {
      var mk = function(types) { return types.map(function(t, i) { return { type: t, id: i }; }); };
      var r1 = Zhan.Rules.computeCombos(mk(['attack','attack','wild']), 3);
      T.assert(r1.length === 1 && r1[0].n === 3, '[a,a,w] min3 → combo n=3');
      T.assert(r1._claimedWildIndices.length === 1, '[a,a,w] 1 wild claimed');
      var r2 = Zhan.Rules.computeCombos(mk(['attack','wild']), 3);
      T.assert(r2.length === 0, '[a,w] min3 → no combo');
      var r3 = Zhan.Rules.computeCombos(mk(['wild','attack','wild']), 3);
      T.assert(r3.length === 1 && r3[0].n === 3, '[w,a,w] min3 → combo n=3');
      T.assert(r3._claimedWildIndices.length === 2, '[w,a,w] 2 wilds claimed');
      var r4 = Zhan.Rules.computeCombos(mk(['attack','attack','attack']), 3);
      T.assert(r4.length === 1 && r4[0].n === 3, '[a,a,a] min3 → combo n=3');
      T.assert(r4._claimedWildIndices.length === 0, '[a,a,a] 0 wilds claimed');
    })();
    console.log('--- getEffectDescription ---');
    (function() {
      var s1 = T.mockState({ effectiveVulnMult: 2.0, buffDurationBonus: 1 });
      var before = JSON.stringify(s1);
      var desc1 = Zhan.Rules.getEffectDescription(s1, 'vulnerable', 4);
      T.assert(desc1.indexOf('易伤') === 0, 'vulnerable desc starts with 易伤');
      T.assert(desc1.indexOf('2') >= 0, 'vulnerable desc contains mult');
      T.assert(JSON.stringify(s1) === before, 'getEffectDescription does not mutate state (vuln)');
      var s2 = T.mockState({ effectiveAtkBuffMult: 1.5 });
      var before2 = JSON.stringify(s2);
      var desc2 = Zhan.Rules.getEffectDescription(s2, 'atk_buff', 3);
      T.assert(desc2.indexOf('攻×') === 0, 'atk_buff desc starts with 攻×');
      T.assert(desc2.indexOf('1.5') >= 0, 'atk_buff desc contains 1.5');
      T.assert(JSON.stringify(s2) === before2, 'getEffectDescription does not mutate state (atk_buff)');
      var s3 = T.mockState();
      var desc3 = Zhan.Rules.getEffectDescription(s3, 'stun', 5);
      T.assert(desc3.indexOf('眩晕') === 0, 'stun desc starts with 眩晕');
      var s4 = T.mockState({ effectiveDefBuffRatio: 0.7 });
      var desc4 = Zhan.Rules.getEffectDescription(s4, 'def_buff', 3);
      T.assert(desc4.indexOf('减伤') === 0, 'def_buff desc starts with 减伤');
      var s5 = T.mockState();
      s5.enemyEffects.atk_down_pct = 30;
      var desc5 = Zhan.Rules.getEffectDescription(s5, 'atk_down', 3);
      T.assert(desc5.indexOf('降攻') === 0, 'atk_down desc starts with 降攻');
      var desc6 = Zhan.Rules.getEffectDescription(s5, 'nonexistent', 3);
      T.assert(desc6 === '', 'unknown type returns empty');
    })();
    console.log('--- window.G fallback ---');
    (function() {
      var saved = Zhan.Engine.state;
      Zhan.Engine.state = null;
      var threw = false;
      try { Zhan.Engine._showRelicSelect(); } catch(e) { threw = true; }
      T.assert(!threw, 'Zhan.Engine._showRelicSelect with null state does not throw');
      var threw2 = false;
      try { log('test-null-log'); } catch(e) { threw2 = true; }
      T.assert(!threw2, 'log with null state does not throw');
      Zhan.Engine.state = saved;
    })();
    console.log('--- hiss/groom ---');
    (function() {
      var g1 = T.mockState();
      g1.turn = 0;
      g1.boss.hpTriggers = ['groom', 'hiss'];
      g1.hissPrevHP = 250; g1.enemyHP = 199; g1.enemyMaxHP = 300;
      g1.turn = 3;
      g1.playerEffects = { atk_buff: 3 };
      g1.enemyEffects = { vulnerable: 2, atk_down: 2, atk_down_pct: 30, stun: 1 };
      g1.effectiveVulnMult = 1.5;
      Zhan.Systems.Boss.runHpTriggers(g1, 'hiss');
      T.assert(JSON.stringify(g1.playerEffects) === '{}', 'hiss clears playerEffects');
      T.assert(JSON.stringify(g1.enemyEffects) === '{}', 'hiss clears enemyEffects');
      var g2 = T.mockState();
      g2.turn = 3;
      g2.boss.hpTriggers = ['groom', 'hiss'];
      g2.enemyEffects = { vulnerable: 2, atk_down: 2, atk_down_pct: 30, stun: 1 };
      g2.effectiveVulnMult = 1.5;
      Zhan.Systems.Boss.runHpTriggers(g2, 'groom');
      T.assert(g2.enemyEffects.vulnerable === 0, 'groom clears vulnerable');
      T.assert(g2.enemyEffects.atk_down === 0, 'groom clears atk_down');
      T.assert(g2.enemyEffects.stun === 0, 'groom clears stun');
      var g3 = T.mockState();
      g3.turn = 3;
      g3.boss.hpTriggers = ['groom', 'hiss'];
      g3.enemyEffects = { vulnerable: 5 };
      g3.effectiveVulnMult = 1.5;
      var before3 = JSON.stringify(g3.enemyEffects);
      Zhan.Systems.Boss.runHpTriggers(g3, 'nonexistent');
      T.assert(JSON.stringify(g3.enemyEffects) === before3, 'unknown filterId does nothing');
      var g4 = T.mockState();
      g4.boss.hpTriggers = [];
      Zhan.Systems.Boss.runHpTriggers(g4, 'hiss');
      T.assert(true, 'no hpTriggers no error');
    })();
    console.log('--- Relic handlers ---');
    (function() {
      var g1 = T.mockState();
      var beforeWild = g1.deckConfig.wild;
      Zhan.Systems.Relic._handlers.multiplyDeckCard(g1, { cardType: 'wild', factor: 2 });
      T.assert(g1.deckConfig.wild === beforeWild * 2, 'multiplyDeckCard doubles wild');
      var g1b = T.mockState();
      var beforeAtk = g1b.deckConfig.attack;
      Zhan.Systems.Relic._handlers.multiplyDeckCard(g1b, { cardType: 'attack', factor: 2 });
      T.assert(g1b.deckConfig.attack === beforeAtk * 2, 'multiplyDeckCard doubles attack');
      var g2 = T.mockState();
      Zhan.Systems.Relic._handlers.setEffectiveMinCombo(g2, { value: 2 });
      T.assert(g2.effectiveMinCombo === 2, 'setEffectiveMinCombo → 2');
      var g3 = T.mockState();
      Zhan.Systems.Relic._handlers.increaseSlotSize(g3, { amount: 3 });
      T.assert(g3.effectiveSlotSize === 13, 'increaseSlotSize +3 → 13');
      var g5 = T.mockState();
      Zhan.Systems.Relic._handlers.setBuffDurationBonus(g5, { amount: 1 });
      T.assert(g5.buffDurationBonus === 1, 'setBuffDurationBonus → 1');
      var g6 = T.mockState();
      Zhan.Systems.Relic._handlers.setOverloadBuffs(g6, { atkBuffMult: 2.0, vulnMult: 2.0, defBuffRatio: 0.5 });
      T.assert(g6.atkBuffMult === 2.0, 'setOverloadBuffs atkBuffMult');
      T.assert(g6.vulnMult === 2.0, 'setOverloadBuffs vulnMult');
      T.assert(g6.defBuffRatio === 0.5, 'setOverloadBuffs defBuffRatio');
      var g7 = T.mockState();
      Zhan.Systems.Relic._handlers.setNoUnmatchedPenalty(g7, { value: true });
      T.assert(g7.noUnmatchedPenalty === true, 'setNoUnmatchedPenalty');
      var g8 = T.mockState();
      var cards = [{ type: 'special_atk', label: '特攻', emoji: '🙈', dmg: 40 }];
      Zhan.Systems.Relic._handlers.addSpecialCards(g8, { cards: cards });
      T.assert(g8.specialCards && g8.specialCards.length === 1 && g8.specialCards[0].dmg === 40, 'addSpecialCards');
      var g9 = T.mockState();
      T.assert(g9.tenacityUsed === false, 'tenacity starts false');
      Zhan.Systems.Relic._handlers.enableTenacity(g9);
      T.assert(g9.tenacityUsed === false, 'enableTenacity resets to false');
      var g10 = T.mockState();
      Zhan.Systems.Relic._handlers.enableFury(g10);
      T.assert(g10.furyEnabled === true, 'enableFury sets flag');
      var g11 = T.mockState();
      Zhan.Systems.Relic._handlers.increaseMaxHP(g11, { amount: 50 });
      T.assert(g11.playerMaxHP === CONFIG.PLAYER_MAX_HP + 50, 'increaseMaxHP +50');
    })();
    console.log('--- applyInit multi-relic ---');
    (function() {
      var g = T.mockState();
      g.activeRelics = ['slot_plus2', 'wild_core', 'life_core', 'endurance_core'];
      Zhan.Systems.Relic.applyInit(g);
      T.assert(g.effectiveSlotSize === 13, 'applyInit slot+wild → 13');
      T.assert(g.wildCoreSlot === true, 'applyInit wildCore flag');
      T.assert(g.playerMaxHP === CONFIG.PLAYER_MAX_HP + 50, 'applyInit life_core +50');
      T.assert(g.buffDurationBonus === 1, 'applyInit endurance_core');
      var g2 = T.mockState();
      g2.activeRelics = ['combo_core'];
      Zhan.Systems.Relic.applyInit(g2);
      T.assert(g2.effectiveMinCombo === 2, 'applyInit combo_core → minCombo=2');
      var g3 = T.mockState();
      g3.activeRelics = [];
      var before3 = JSON.stringify(g3);
      Zhan.Systems.Relic.applyInit(g3);
      T.assert(JSON.stringify(g3) === before3, 'applyInit empty relics does nothing');
    })();
    console.log('--- computeCombos edge ---');
    (function() {
      var r1 = Zhan.Rules.computeCombos([], 3);
      T.assert(Array.isArray(r1) && r1.length === 0, 'computeCombos([]) → []');
      T.assert(Array.isArray(r1._claimedWildIndices) && r1._claimedWildIndices.length === 0, 'computeCombos([]) no wilds');
      var r2 = Zhan.Rules.computeCombos([{type:'wild', id:1}], 3);
      T.assert(Array.isArray(r2) && r2.length === 0, 'computeCombos([w]) → []');
      T.assert(Array.isArray(r2._claimedWildIndices) && r2._claimedWildIndices.length === 0, 'computeCombos([w]) no wilds claimed');
      var r3 = Zhan.Rules.computeCombos([{type:'wild',id:1},{type:'attack',id:2}], 3);
      T.assert(r3.length === 0, 'computeCombos([w,a]) min3 → []');
      var r4 = Zhan.Rules.computeCombos([{type:'attack',id:1},{type:'wild',id:2},{type:'attack',id:3}], 3);
      T.assert(r4.length === 1 && r4[0].n === 3, 'computeCombos([a,w,a]) min3 → n=3');
      var r5 = Zhan.Rules.computeCombos([{type:'attack',id:1},{type:'attack',id:2},{type:'attack',id:3},{type:'defend',id:4},{type:'defend',id:5},{type:'defend',id:6}], 3);
      T.assert(r5.length === 2, 'computeCombos mixed → 2 combos');
      T.assert(r5[0].type === 'attack' && r5[1].type === 'defend', 'computeCombos mixed types');
      var r6 = Zhan.Rules.computeCombos([{type:'attack',id:1},{type:'attack',id:2},{type:'junk',id:3,isJunk:true},{type:'attack',id:4},{type:'attack',id:5},{type:'attack',id:6}], 3);
      T.assert(r6.length === 1, 'junk breaks combo');
      var r7 = Zhan.Rules.computeCombos([{type:'wild',id:1},{type:'wild',id:2},{type:'attack',id:3},{type:'wild',id:4}], 3);
      T.assert(r7.length === 1 && r7[0].n === 4, 'computeCombos([w,w,a,w]) → n=4');
    })();
    console.log('--- resolveWildType edge ---');
    (function() {
      var t1 = Zhan.Rules.resolveWildType([{type:'wild'},{type:'defend'}], 0);
      T.assert(t1 === 'defend', 'resolveWildType right → defend');
      var t2 = Zhan.Rules.resolveWildType([{type:'attack'},{type:'wild'}], 1);
      T.assert(t2 === 'attack', 'resolveWildType left → attack');
      var t3 = Zhan.Rules.resolveWildType([{type:'wild'},{type:'wild'}], 0);
      T.assert(t3 === 'wild', 'resolveWildType all wild → wild');
      var t4 = Zhan.Rules.resolveWildType([{type:'attack'}], 0);
      T.assert(t4 === 'attack', 'resolveWildType non-wild passes through');
      var t5 = Zhan.Rules.resolveWildType([{type:'junk',isJunk:true}], 0);
      T.assert(t5 === 'junk', 'resolveWildType junk → junk');
      var t6 = Zhan.Rules.resolveWildType([{type:'attack'},{type:'wild'},{type:'defend'}], 1);
      T.assert(t6 === 'attack', 'resolveWildType left priority');
    })();
    console.log('--- calcPursuitMultiplier ---');
    (function() {
      T.assert(Zhan.Rules.calcPursuitMultiplier(3, 3) === 1, 'pursuit 3wmin3 → 1');
      T.assert(Zhan.Rules.calcPursuitMultiplier(4, 3) > 1, 'pursuit 4wmin3 > 1');
      T.assert(Zhan.Rules.calcPursuitMultiplier(2, 3) === 1, 'pursuit below min → 1');
    })();
    console.log('--- computeEffectiveFury ---');
    (function() {
      var f1 = Zhan.Rules.computeEffectiveFury(100, 100, { furyEnabled: false });
      T.assert(f1.atkBuffMult === CONFIG.ATK_BUFF_MULT, 'fury off → default atkBuffMult');
      T.assert(f1.vulnMult === CONFIG.VULN_MULT, 'fury off → default vulnMult');
      var f2 = Zhan.Rules.computeEffectiveFury(100, 100, { furyEnabled: true, atkBuffMult: CONFIG.ATK_BUFF_MULT });
      T.assert(f2.atkBuffMult === CONFIG.ATK_BUFF_MULT, 'fury full HP → no change');
      var f3 = Zhan.Rules.computeEffectiveFury(50, 100, { furyEnabled: true, atkBuffMult: CONFIG.ATK_BUFF_MULT, vulnMult: CONFIG.VULN_MULT, defBuffRatio: CONFIG.DEF_BUFF_RATIO });
      T.assert(f3.atkBuffMult > CONFIG.ATK_BUFF_MULT, 'fury half HP → increased atkBuffMult');
    })();
    console.log('--- Boss runHpTriggers conditions ---');
    (function() {
      var g1 = T.mockState();
      g1.turn = 0;
      g1.boss.hpTriggers = ['groom'];
      g1.enemyEffects = { vulnerable: 2, atk_down: 2, stun: 1 };
      g1.effectiveVulnMult = 1.5;
      Zhan.Systems.Boss.runHpTriggers(g1, 'groom');
      T.assert(g1.enemyEffects.vulnerable === 2, 'groom turn=0 not triggered');
      var g2 = T.mockState();
      g2.turn = 1;
      g2.boss.hpTriggers = ['groom'];
      g2.enemyEffects = { vulnerable: 2, atk_down: 2, stun: 1 };
      g2.effectiveVulnMult = 1.5;
      Zhan.Systems.Boss.runHpTriggers(g2, 'groom');
      T.assert(g2.enemyEffects.vulnerable === 2, 'groom turn=1 not triggered');
      var g3 = T.mockState();
      g3.turn = 3;
      g3.boss.hpTriggers = ['hiss'];
      g3.enemyMaxHP = 300;
      g3.enemyHP = 150;
      g3.hissPrevHP = 250;
      g3.playerEffects = { atk_buff: 2 };
      g3.enemyEffects = { vulnerable: 1 };
      Zhan.Systems.Boss.runHpTriggers(g3, 'hiss');
      T.assert(JSON.stringify(g3.playerEffects) === '{}', 'hiss cross-threshold clears effects');
    })();
    console.log('=== All Tests Passed ===');
  }
};
if (location.hash === '#test') {
  setTimeout(function() { Zhan.Test.run(); }, 800);
}
