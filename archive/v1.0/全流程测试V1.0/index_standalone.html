<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>斩 v14</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e; color: #eee;
  min-height: 100dvh; display: flex; justify-content: center; align-items: flex-start;
  touch-action: manipulation; user-select: none; -webkit-user-select: none; overflow-x: hidden;
}
#app { width: 100%; max-width: 520px; padding: 6px; display: flex; flex-direction: column; gap: 4px; }

/* spirit bomb bar */
#spirit-bar-wrap { background: #16213e; border-radius: 8px; padding: 3px 8px; display: flex; align-items: center; gap: 6px; font-size: 10px; }
#spirit-bar-wrap .spirit-label { color: #f39c12; font-weight: bold; white-space: nowrap; }
#spirit-bar-outer { flex: 1; height: 8px; background: #0f3460; border-radius: 4px; overflow: hidden; }
#spirit-bar-inner { height: 100%; background: linear-gradient(90deg, #e67e22, #f1c40f, #f39c12); border-radius: 4px; transition: width 0.3s; width: 0%; }

/* top row */
#top-row { display: flex; gap: 6px; }
#top-row > div { flex: 1; background: #16213e; border-radius: 10px; padding: 4px 5px; display: flex; flex-direction: column; align-items: center; gap: 1px; }
.avatar { font-size: 24px; line-height: 1; }
.entity-name { font-size: 9px; color: #888; letter-spacing: 1px; }
.stat-row { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; font-size: 10px; width: 100%; }
.stat-row .stat-item { display: flex; align-items: center; gap: 1px; background: #0f3460; padding: 0 5px; border-radius: 4px; line-height: 1.5; }
.stat-row .stat-item .val { font-weight: bold; }
.stat-hp .val { color: #e74c3c; }
.stat-shield .val { color: #3498db; }
.stat-power .val { color: #9b59b6; }
.enemy-avatar { font-size: 30px; }
.player-box { border-top: 3px solid #3498db; }
.enemy-box { border-top: 3px solid #e74c3c; }

/* badges */
.badge-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 1px; }
.badge { font-size: 8px; padding: 0 4px; border-radius: 3px; line-height: 1.5; font-weight: bold; }
.badge-stun { background: #6c3483; color: #d7bde2; }
.badge-vuln { background: #7b241c; color: #f5b7b1; }
.badge-atk-down { background: #4a235a; color: #d2b4de; }
.badge-atk-up { background: #6e2c00; color: #f0b27a; }
.badge-def-up { background: #0b5345; color: #a3e4d7; }

/* deck info */
#deck-info { display: flex; justify-content: center; gap: 6px; font-size: 10px; color: #888; padding: 1px 0; }
#deck-info span { background: #0f3460; padding: 1px 6px; border-radius: 4px; }

/* enemy intent */
#enemy-intent { font-size: 10px; margin-top: 1px; color: #aaa; }

/* board */
#board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: #16213e; border-radius: 10px; padding: 4px; touch-action: none; }
.card-slot { background: #0f3460; border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: transform 0.06s; aspect-ratio: 1 / 1; }
.card-slot:active { transform: scale(0.93); }
.card-slot .card { width: 100%; height: 100%; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; gap: 0; transition: opacity 0.15s; pointer-events: none; position: relative; }
.card-slot .card .card-icon { font-size: 18px; line-height: 1; }
.card-slot .card .card-label { font-size: 7px; opacity: 0.8; letter-spacing: 0; pointer-events: none; line-height: 1; }
.card-slot .card .card-count { position: absolute; top: 1px; left: 2px; font-size: 10px; color: #fff; font-weight: 900; opacity: 0.9; background: rgba(0,0,0,0.4); padding: 0 3px; border-radius: 3px; line-height: 1.3; }
.card-empty { background: transparent; border: 1px dashed #2c3e50; cursor: default; }
.card-empty .card { display: none; }
.card-slot .stack-count { position: absolute; top: 2px; left: 3px; font-size: 10px; color: #111; font-weight: 900; opacity: 1; background: rgba(255,255,255,0.85); padding: 0 4px; border-radius: 3px; line-height: 1.3; }
.card-slot.locked { opacity: 0.4; cursor: not-allowed; }
.card-slot.smeared { filter: blur(4px); }
.card-slot.double-tap-active { outline: 2px solid #f1c40f; transform: translateY(-2px); z-index: 10; }

/* card colors */
.card-attack { background: #c0392b; color: #fff; }
.card-defend { background: #2980b9; color: #fff; }
.card-heal { background: #e91e63; color: #fff; }
.card-wild { background: #f39c12; color: #fff; }
.card-atk-down { background: #8e44ad; color: #fff; }
.card-vulnerable { background: #a93226; color: #fff; }
.card-stun { background: #9b59b6; color: #fff; }
.card-atk-buff { background: #e67e22; color: #fff; }
.card-def-buff { background: #16a085; color: #fff; }
.card-junk { background: #555; color: #999; }

/* slot */
#slot-bar { display: flex; gap: 2px; background: #16213e; border-radius: 10px; padding: 3px; min-height: 40px; }
.eslot { flex: 1; background: #0f3460; border-radius: 4px; border: 1px dashed #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; transition: all 0.1s; aspect-ratio: 1 / 1.1; }
.eslot.filled { border-style: solid; }
.eslot.filled.attack { background: #c0392b; border-color: #c0392b; }
.eslot.filled.defend { background: #2980b9; border-color: #2980b9; }
.eslot.filled.heal { background: #e91e63; border-color: #e91e63; }
.eslot.filled.wild { background: #f39c12; border-color: #f39c12; }
.eslot.filled.atk-down { background: #8e44ad; border-color: #8e44ad; }
.eslot.filled.vulnerable { background: #a93226; border-color: #a93226; }
.eslot.filled.stun { background: #9b59b6; border-color: #9b59b6; }
.eslot.filled.atk-buff { background: #e67e22; border-color: #e67e22; }
.eslot.filled.def-buff { background: #16a085; border-color: #16a085; }
.eslot.filled.junk { background: #555; border-color: #555; }
.eslot.locked { opacity: 0.3; border-color: #666; }
.eslot.preview { border-color: #f1c40f; background: rgba(241,196,15,0.08); }

/* combo bar */
#combo-bar { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; font-size: 10px; padding: 1px 0; min-height: 16px; }
.combo-preview { background: #0f3460; border-radius: 4px; padding: 1px 6px; font-weight: bold; font-size: 10px; }
.combo-preview.atk { border-left: 2px solid #c0392b; color: #e74c3c; }
.combo-preview.def { border-left: 2px solid #2980b9; color: #3498db; }
.combo-preview.heal { border-left: 2px solid #e91e63; color: #f06292; }
.combo-preview.wild { border-left: 2px solid #f39c12; color: #f1c40f; }
.combo-preview.atk-down { border-left: 2px solid #8e44ad; color: #bb8fce; }
.combo-preview.vulnerable { border-left: 2px solid #a93226; color: #e6b0aa; }
.combo-preview.stun { border-left: 2px solid #9b59b6; color: #d2b4de; }
.combo-preview.atk-buff { border-left: 2px solid #e67e22; color: #f0b27a; }
.combo-preview.def-buff { border-left: 2px solid #16a085; color: #76d7c4; }
.combo-none { color: #555; font-size: 10px; }

/* actions */
#actions { display: flex; gap: 6px; }
#actions button { flex: 1; padding: 7px; border: none; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: transform 0.06s, opacity 0.1s; touch-action: manipulation; }
#actions button:active { transform: scale(0.96); }
#actions button:disabled { opacity: 0.3; cursor: default; transform: none; }
#btn-end-turn { background: #e67e22; color: #fff; }
#btn-end-turn:disabled { background: #7f8c8d; }
#btn-reset { background: #2c3e50; color: #ccc; }

/* log */
#log { background: #0d1b2a; border-radius: 8px; padding: 3px 6px; font-size: 9px; min-height: 28px; max-height: 56px; overflow-y: auto; color: #7f8c8d; line-height: 1.3; }
#log .highlight { color: #f1c40f; }
#log .dmg { color: #e74c3c; }
#log .def { color: #3498db; }
#log .heal { color: #2ecc71; }
#log .buff { color: #f39c12; }

/* result overlay */
#result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
#result-overlay.show { display: flex; }
#result-box { background: #16213e; border-radius: 16px; padding: 22px 28px; text-align: center; max-width: 280px; }
#result-box h2 { font-size: 22px; margin-bottom: 8px; }
#result-box p { color: #aaa; margin-bottom: 14px; font-size: 13px; }
#result-box button { padding: 8px 30px; border: none; border-radius: 8px; background: #e67e22; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; }
#result-box button:active { transform: scale(0.96); }

@media (max-width: 380px) {
  #app { padding: 3px; gap: 3px; }
  .card-slot .card .card-icon { font-size: 14px; }
  .card-slot .card .card-label { font-size: 6px; }
  .avatar { font-size: 20px; }
  .enemy-avatar { font-size: 26px; }
  .stat-row .stat-item { font-size: 8px; padding: 0 3px; }
  #actions button { padding: 5px; font-size: 11px; }
  .card-slot .stack-count { font-size: 8px; }
  .badge { font-size: 7px; }
}

</style>
<style>
/* relic select */
#relic-select-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
#relic-select-overlay.show { display: flex; }
#relic-select-box { background: #16213e; border-radius: 16px; padding: 18px 22px; text-align: center; max-width: 360px; width: 90%; }
#relic-select-box h2 { font-size: 18px; margin-bottom: 4px; color: #f1c40f; }
#relic-select-desc { color: #aaa; font-size: 11px; margin-bottom: 10px; }
#relic-select-options { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.relic-card { background: #0f3460; border-radius: 10px; padding: 10px 14px; cursor: pointer; flex: 1; min-width: 120px; max-width: 160px; border: 2px solid transparent; transition: border-color 0.15s; }
.relic-card:hover, .relic-card:active { border-color: #f1c40f; }
.relic-card .relic-name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 3px; }
.relic-card .relic-type { font-size: 9px; color: #888; margin-bottom: 4px; }
.relic-card .relic-desc { font-size: 10px; color: #aaa; line-height: 1.3; }

</style>
</head>
<body>
<div id="app">
  <div id="spirit-bar-wrap">
    <span class="spirit-label">💥 元气弹</span>
    <div id="spirit-bar-outer"><div id="spirit-bar-inner"></div></div>
    <span id="spirit-text">0%</span>
  </div>
  <div id="top-row">
    <div class="player-box">
      <div class="avatar" id="player-avatar">🦸</div>
      <div class="entity-name">勇 者</div>
      <div class="stat-row">
        <span class="stat-item stat-hp"><span>❤️</span><span class="val" id="player-hp">100</span></span>
        <span class="stat-item stat-shield"><span>🛡️</span><span class="val" id="player-shield">0</span></span>
      </div>
      <div class="badge-row" id="player-badges"></div>
    </div>
    <div class="enemy-box">
      <div class="avatar enemy-avatar" id="enemy-avatar">💀</div>
      <div class="entity-name" id="enemy-name">骷 髅</div>
      <div class="stat-row">
        <span class="stat-item stat-hp"><span>❤️</span><span class="val" id="enemy-hp">100</span></span>
        <span class="stat-item stat-shield"><span>🛡️</span><span class="val" id="enemy-shield">20</span></span>
        <span class="stat-item stat-power"><span>⚡</span><span class="val" id="enemy-power">0</span></span>
      </div>
      <div class="badge-row" id="enemy-badges"></div>
      <div id="enemy-intent">⚔️ 准备攻击</div>
    </div>
  </div>
  <div id="deck-info">
    <span>🃏 <span id="deck-remain">250</span> 张</span>
    <span>🔒 <span id="hidden-cards">0</span> 暗牌</span>
    <span>🔍 <span id="visible-cards">0</span> 可见</span>
  </div>
  <div id="board"></div>
  <div id="combo-bar"></div>
  <div id="slot-bar"></div>
  <div id="actions">
    <button id="btn-end-turn" disabled>结束回合</button>
    <button id="btn-reset">重置</button>
  </div>
  <div id="log"></div>
</div>
<div id="result-overlay">
  <div id="result-box">
    <h2 id="result-title">⚔️</h2>
    <p id="result-desc"></p>
    <button id="btn-restart">再来一局</button>
  </div>
</div>

<!-- Boss 描述弹窗 -->
<div id="boss-info-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;">
  <div style="background:#16213e;border-radius:12px;padding:16px 20px;max-width:300px;text-align:center;">
    <div id="boss-info-emoji" style="font-size:40px;margin-bottom:4px;"></div>
    <div id="boss-info-name" style="font-size:16px;font-weight:bold;color:#f1c40f;margin-bottom:4px;"></div>
    <div id="boss-info-mechanic" style="font-size:11px;color:#aaa;line-height:1.4;margin-bottom:6px;"></div>
    <div id="boss-info-stats" style="font-size:10px;color:#888;"></div>
    <button id="btn-boss-info-close" style="margin-top:10px;padding:4px 20px;border:none;border-radius:6px;background:#e67e22;color:#fff;font-size:12px;cursor:pointer;">关闭</button>
  </div>
</div>

<!-- 勇者圣物弹窗（独立于 Boss 弹窗） -->
<div id="player-info-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;">
  <div style="background:#16213e;border-radius:12px;padding:16px 20px;max-width:300px;text-align:center;">
    <div id="player-info-emoji" style="font-size:40px;margin-bottom:4px;">🦸</div>
    <div id="player-info-name" style="font-size:16px;font-weight:bold;color:#3498db;margin-bottom:4px;">勇者圣物</div>
    <div id="player-info-mechanic" style="font-size:11px;color:#aaa;line-height:1.4;margin-bottom:6px;"></div>
    <div id="player-info-stats" style="font-size:10px;color:#888;"></div>
    <button id="btn-player-info-close" style="margin-top:10px;padding:4px 20px;border:none;border-radius:6px;background:#e67e22;color:#fff;font-size:12px;cursor:pointer;">关闭</button>
  </div>
</div>

<!-- 圣物选择界面 -->
<div id="relic-select-overlay">
  <div id="relic-select-box">
    <h2>🎁 选择圣物</h2>
    <p id="relic-select-desc">第二关通过！选择一个圣物</p>
    <div id="relic-select-options"></div>
    <div id="relic-select-buttons" style="display:flex;gap:6px;margin-top:8px;justify-content:center;">
      <button id="btn-relic-reroll" style="padding:6px 16px;border:none;border-radius:8px;background:#2c3e50;color:#ccc;font-size:12px;font-weight:bold;cursor:pointer;">🔄 刷新</button>
      <button id="btn-relic-confirm" style="padding:6px 16px;border:none;border-radius:8px;background:#e67e22;color:#fff;font-size:12px;font-weight:bold;cursor:pointer;">✅ 确认（全拿）</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  斩 v14 — data.js
//  所有配置数据：Boss定义、圣物定义、卡牌、数值常量
// ============================================================

// ========== 战斗数值常量 ==========
var CONFIG = {
  BOARD_ROWS: 5,
  BOARD_COLS: 5,
  SLOT_SIZE: 10,
  PLAYER_HP: 100,
  PLAYER_MAX_HP: 100,

  // Boss 默认（第二关骷髅/第三关Boss各自覆盖）
  ENEMY_HP: 100,
  ENEMY_START_SHIELD: 0,
  ENEMY_BASE_ATK: 12,
  ENEMY_CYCLE: 7,
  SHIELD_RESET_ON_OWN_TURN: true,

  MIN_COMBO: 3,
  DOUBLE_TAP_DELAY: 350,     // 双击判定间隔 ms
  LONG_PRESS_DELAY: 600,     // 长按触发间隔 ms
  SWIPE_THRESHOLD: 20,       // 下滑拖拽阈值 px
  LOG_MAX_LINES: 100,        // 日志最大行数
  VULN_MULT: 1.5,
  ATK_BUFF_MULT: 1.5,
  DEF_BUFF_RATIO: 0.7,
  ATK_DOWN_PCT: 30,
  UNMATCHED_PENALTY: 1,
};

// ========== 卡牌定义 ==========
var CARD_TYPES = {
  attack:     { emoji: '🗡', label: '攻击', color: 'attack',     cssClass: 'card-attack' },
  defend:     { emoji: '🛡️', label: '防御', color: 'defend',      cssClass: 'card-defend' },
  heal:       { emoji: '❤️', label: '回血', color: 'heal',        cssClass: 'card-heal' },
  wild:       { emoji: '💎', label: '万能', color: 'wild',        cssClass: 'card-wild' },
  atk_down:   { emoji: '⬇️', label: '降攻', color: 'atk-down',    cssClass: 'card-atk-down' },
  vulnerable: { emoji: '💔', label: '易伤', color: 'vulnerable',  cssClass: 'card-vulnerable' },
  stun:       { emoji: '💫', label: '眩晕', color: 'stun',        cssClass: 'card-stun' },
  atk_buff:   { emoji: '⚡', label: '攻加', color: 'atk-buff',    cssClass: 'card-atk-buff' },
  def_buff:   { emoji: '💨', label: '减伤', color: 'def-buff',    cssClass: 'card-def-buff' },
};

var BUFF_TYPES = { vulnerable:1, stun:1, atk_buff:1, def_buff:1, atk_down:1 };

// ========== 牌组构成 ==========
var DECK_SIZES = {
  attack:     50,
  defend:     50,
  heal:       25,
  wild:       10,
  atk_down:   25,
  vulnerable: 25,
  stun:       15,
  atk_buff:   20,
  def_buff:   20,
};

(function() {
  var total = 0;
  for (var k in DECK_SIZES) total += DECK_SIZES[k];
  CONFIG.TOTAL_CARDS = total;
  CONFIG.CARDS_PER_PILE = Math.floor(total / (CONFIG.BOARD_ROWS * CONFIG.BOARD_COLS));
})();

// ========== Boss 行动循环模板（新版7回合） ==========
// 所有 Boss 共用，10只猫猫在此基础上加专属 traits
var BOSS_CYCLE_TEMPLATE = [
  { type: 'attack' },
  { type: 'defend' },
  { type: 'buff_power' },
  { type: 'attack' },
  { type: 'defend' },
  { type: 'charge' },
  { type: 'rage' },
];

// ========== Boss 通用触发器 ==========
var GROOM_TRIGGER = {
  id: 'groom',
  condition: function(G) { return G.turn > 0 && G.turn % 4 === 0; },
  execute: function(G) {
    // 清空 Boss 自身 Debuff
    G.enemyEffects.atk_down = 0;
    G.enemyEffects.atk_down_pct = 0;
    G.enemyEffects.stun = 0;
    log('🐱 舔毛！Boss 清除自身 Debuff');
  }
};

var HISS_TRIGGER = {
  id: 'hiss',
  condition: function(G) {
    if (G.hissPrevHP === undefined) G.hissPrevHP = G.enemyMaxHP;
    var triggered = false;
    // 检查是否跨越了 100 血阈值
    var prevThreshold = Math.floor(G.hissPrevHP / 100);
    var curThreshold = Math.floor(G.enemyHP / 100);
    if (curThreshold < prevThreshold && G.enemyHP > 0) {
      triggered = true;
    }
    G.hissPrevHP = G.enemyHP;
    return triggered;
  },
  execute: function(G) {
    // 清空全场 Buff/Debuff
    G.playerEffects = {};
    G.enemyEffects = {};
    log('🐱 哈气！！全场 Buff/Debuff 清空！');
  }
};

// ========== 10只猫猫 Boss 定义 ==========
var BOSSES = {
  tabby: {  // 狸花猫
    id: 'tabby', name: '狸花猫', emoji: '🐱',
    desc: '每2回合随机锁定2摞牌2回合
被锁的牌无法点选',
    maxHP: 300, baseAtk: 24, startShield: 0,
    cycle: BOSS_CYCLE_TEMPLATE,
    traits: [{
      id: 'lock_pile',
      onTurnStart: function(G) {
        if (G.turn % 2 !== 0) return; // 每2回合
        var flat = G.piles.flat();
        var candidates = [];
        for (var i = 0; i < flat.length; i++) {
          if (flat[i].length > 0 && !G.lockedPiles[i]) candidates.push(i);
        }
        if (candidates.length < 2) return;
        // 随机锁2摞
        shuffleArray(candidates);
        G.lockedPiles = G.lockedPiles || {};
        G.lockedPiles[candidates[0]] = 2;
        G.lockedPiles[candidates[1]] = 2;
        log('🐱 狸花锁牌：锁定了2摞牌，持续2回合');
      },
      onTurnEnd: function(G) {
        if (!G.lockedPiles) return;
        for (var k in G.lockedPiles) {
          G.lockedPiles[k]--;

<script>
// ============================================================
//  斩 v14 — core.js
//  战斗引擎：洗牌/发牌/结算/状态管理/敌人回合
//  依赖 data.js（先加载）
// ============================================================

// ========== 伤害公式 ==========
function calcBaseValue(totalCount) {
  return 4 + (totalCount - 3) * 2;
}

function calcPursuitMultiplier(maxComboLen) {
  if (maxComboLen < 4) return 1;
  return 1 + (maxComboLen - 3) * 0.1;
}

function calcAttackValue(totalCount, maxComboLen, G) {
  var minCombo = G.effectiveMinCombo || CONFIG.MIN_COMBO;
  if (totalCount < minCombo) return 0;
  return Math.ceil(calcBaseValue(totalCount) * calcPursuitMultiplier(maxComboLen));
}

function calcDefendValue(totalCount, maxComboLen, G) {
  var minCombo = G.effectiveMinCombo || CONFIG.MIN_COMBO;
  if (totalCount < minCombo) return 0;
  return Math.floor(calcBaseValue(totalCount) * calcPursuitMultiplier(maxComboLen));
}

function calcHealValue(totalCount, maxComboLen, G) {
  var minCombo = G.effectiveMinCombo || CONFIG.MIN_COMBO;
  if (totalCount < minCombo) return 0;
  return Math.floor(calcBaseValue(totalCount) * calcPursuitMultiplier(maxComboLen));
}

// ========== 圣物修正器 ==========
function applyRelicModifiers(type, val, G) {
  // 过载核心：buff/debuff效果翻倍（在 applyStatusEffects 中处理）
  // 狂暴核心：低血增伤
  if (G.furyEnabled && RELICS.fury_core) {
    val = Math.ceil(val * RELICS.fury_core.getMultiplier(G));
  }
  return val;
}

function applyStatusEffects(type, val, G) {
  switch (type) {
    case 'attack':
      if (G.effectiveAtkBuffMult > 0) val = Math.ceil(val * G.effectiveAtkBuffMult);
      if (G.effectiveVulnMult > 0) val = Math.ceil(val * G.effectiveVulnMult);
      break;
    case 'defend':
    case 'heal':
      // 防御/回血不受 atk_buff/vulnerable 影响
      break;
  }
  return val;
}

// ========== 游戏状态 ==========
var G = {};

function newGame() {
  var bossId = G.bossId || 'skeleton';
  var boss = BOSSES[bossId];
  var relics = G.activeRelics || [];
  var stage = G.currentStage || 1;

  G = {
    deck: [], piles: [], slot: [],
    playerHP: CONFIG.PLAYER_HP,
    playerMaxHP: CONFIG.PLAYER_MAX_HP,
    playerShield: 0,
    enemyHP: boss.maxHP,
    enemyMaxHP: boss.maxHP,
    enemyShield: boss.startShield || 0,
    enemyPower: 0,
    turn: 0,
    phase: 'player',
    pickedId: 0,
    logLines: [],
    over: false,
    playerEffects: {},
    enemyEffects: {},
    bossId: bossId,
    boss: boss,
    activeRelics: relics,
    effectiveMinCombo: CONFIG.MIN_COMBO,
    effectiveSlotSize: CONFIG.SLOT_SIZE,
    effectiveAtkBuffMult: 0,
    effectiveVulnMult: 0,
    buffDurationBonus: 0,
    deckConfig: JSON.parse(JSON.stringify(DECK_SIZES)),
    lockedPiles: {},
    lockedSlots: {},
    smearedPiles: {},
    hideIntent: false,
    playerSkipped: false,
    currentStage: stage,
  };

  // 初始化圣物
  for (var i = 0; i < relics.length; i++) {
    var relic = RELICS[relics[i]];
    if (relic && relic.onInit) relic.onInit(G);
  }

  // 初始化哈气 prevHP（挂在 G 上，不共享全局单例）
  if (boss.hpTriggers) {
    for (var j = 0; j < boss.hpTriggers.length; j++) {
      if (boss.hpTriggers[j].id === 'hiss') {
        G.hissPrevHP = boss.maxHP;
      }
    }
  }

  buildDeck();
  // 救命毫毛：特殊卡插入
  if (G.specialCards) {
    for (var sc = 0; sc < G.specialCards.length; sc++) {
      G.deck.unshift({ type: G.specialCards[sc].type, id: G.pickedId++, special: G.specialCards[sc] });
    }
    log('🪶 救命毫毛！获得' + G.specialCards.length + '张特殊卡');
  }
  shuffle(G.deck);
  buildPiles();
  render();
  updateEnemyIntent();
  log('🐱 新局开始！双击或向下拖拽卡牌进槽');
}

function buildDeck() {
  G.deck = [];
  for (var type in G.deckConfig) {
    for (var i = 0; i < G.deckConfig[type]; i++) {
      G.deck.push({ type: type, id: G.pickedId++ });
    }
  }
}

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
}

function shuffleArray(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
}

function buildPiles() {
  G.piles = [];
  for (var r = 0; r < CONFIG.BOARD_ROWS; r++) {
    G.piles[r] = [];
    for (var c = 0; c < CONFIG.BOARD_COLS; c++) G.piles[r][c] = [];
  }
  var idx = 0;
  var totalCards = G.deck.length;
  var nPiles = CONFIG.BOARD_ROWS * CONFIG.BOARD_COLS;
  var basePileSize = Math.floor(totalCards / nPiles);
  var remaining = totalCards - basePileSize * nPiles;
  var flatPiles = [];
  for (var r = 0; r < CONFIG.BOARD_ROWS; r++) {
    for (var c = 0; c < CONFIG.BOARD_COLS; c++) {
      flatPiles.push(G.piles[r][c]);
    }
  }
  for (var i = 0; i < flatPiles.length; i++) {
    var size = basePileSize + (i < remaining ? 1 : 0);
    for (var j = 0; j < size; j++) flatPiles[i].push(G.deck[idx++]);
  }
  for (var pi = 0; pi < flatPiles.length; pi++) {
    var pile = flatPiles[pi];
    if (pile.length > 1) {
      var topN = Math.min(4, pile.length);
      var top = pile.slice(0, topN);
      for (var ti = top.length - 1; ti > 0; ti--) {
        var tj = Math.floor(Math.random() * (ti + 1));
        var tt = top[ti]; top[ti] = top[tj]; top[tj] = tt;
      }
      for (var ti = 0; ti < top.length; ti++) pile[ti] = top[ti];
    }
  }
}

function getTop(pile) { return pile && pile.length ? pile[pile.length-1] : null; }
function popTop(pile) { return pile && pile.length ? pile.pop() : null; }

function pullCard(r, c) {
  if (G.phase !== 'player' || G.over) return false;
  // 检查锁定牌堆
  var flatIdx = r * CONFIG.BOARD_COLS + c;
  if (G.lockedPiles && G.lockedPiles[flatIdx]) {
    log('🔒 这摞牌被锁定了！');
    return false;
  }
  var pile = G.piles[r][c];
  var top = getTop(pile);
  if (!top || G.slot.length >= G.effectiveSlotSize) return false;
  // 检查锁定槽位
  if (G.lockedSlots && G.lockedSlots[G.slot.length]) {
    log('🔒 这个槽位被锁定了！');
    return false;
  }
  var card = popTop(pile);
  if (!card) return false;
  G.slot.push(card);
  updateComboPreview();
  var ct = CARD_TYPES[card.type] || { emoji: '⬜', label: '废牌' };
  log(ct.emoji + ct.label + '→槽(' + G.slot.length + '/' + G.effectiveSlotSize + ')');
  render();
  document.getElementById('btn-end-turn').disabled = false;
  return true;
}

// ========== 万能牌解析 ==========
function resolveWildType(slot, idx) {
  if (slot[idx].type !== 'wild') return slot[idx].type;
  for (var k = idx-1; k >= 0; k--) { if (slot[k].type !== 'wild' && slot[k].type !== 'junk') return slot[k].type; }
  for (var k = idx+1; k < slot.length; k++) { if (slot[k].type !== 'wild' && slot[k].type !== 'junk') return slot[k].type; }
  return 'wild';
}

function computeCombos(slot) {
  if (!slot.length) return [];
  var minCombo = G.effectiveMinCombo || CONFIG.MIN_COMBO;
  var resolved = slot.map(function(c, i) { return {type: resolveWildType(slot, i), card: c, index: i}; });
  var combos = [];
  var i = 0;
  while (i < resolved.length) {
    var typ = resolved[i].type;
    if (typ === 'wild' || typ === 'junk') { i++; continue; }
    var j = i+1;
    while (j < resolved.length && resolved[j].type === typ) j++;
    if (j-i >= minCombo) {
      combos.push({ n: j-i, cards: slot.slice(i,j), type: typ, start: i, end: j });
    }
    i = j;
  }
  return combos;
}

function getComboDuration(n) {
  if (n >= 5) return n - (G.effectiveMinCombo || CONFIG.MIN_COMBO);
  return 1;
}

function getStunDuration(n) {
  var minCombo = G.effectiveMinCombo || CONFIG.MIN_COMBO;
  return n - minCombo + 1; // 2连=1回，3连=2回，5连=4回
}

function getEffectDescription(type, n) {
  var dur = getComboDuration(n);
  var minCombo = G.effectiveMinCombo || CONFIG.MIN_COMBO;
  switch (type) {
    case 'vulnerable': return '易伤×' + CONFIG.VULN_MULT + ' ' + dur + '回合';
    case 'stun':
      var stunDur = getStunDuration(n);
      return '眩晕 ' + stunDur + '回合';
    case 'atk_buff':   return '攻×' + (G.atkBuffMult || CONFIG.ATK_BUFF_MULT) + ' ' + dur + '回合';
    case 'def_buff':   return '减伤×' + (G.defBuffRatio || CONFIG.DEF_BUFF_RATIO) + ' ' + dur + '回合';
    case 'atk_down':   return '降攻-' + CONFIG.ATK_DOWN_PCT + '% ' + dur + '回合';
    default: return '';
  }
}

// ========== 执行回合 ==========
function executeTurn() {
  if (G.phase !== 'player' || G.over) return;

  // 折耳猫：晕玩家
  if (G.playerSkipped) {
    G.playerSkipped = false;
    G.phase = 'resolving';
    log('🐱 被晕眩，跳过回合！');
    G.slot = [];
    render();
    updateEnemyIntent();
    document.getElementById('btn-end-turn').disabled = true;
    setTimeout(function() { enemyTurn(); }, 300);
    return;
  }

  G.phase = 'resolving';
  log('▶ 回合' + (G.turn+1));
  log('⚔️ 勇者行动');

  G.playerShield = 0;

  // 万能槽圣物：首槽自动万能卡
  if (G.autoWildSlot && G.slot.length < G.effectiveSlotSize) {
    G.slot.unshift({ type: 'wild', id: G.pickedId++, autoWild: true });
  }

  // Boss专属 onResolve（阿比弃牌等）
  if (G.boss.traits) {
    for (var ti = 0; ti < G.boss.traits.length; ti++) {
      var trait = G.boss.traits[ti];
      if (trait.onResolve) trait.onResolve(G, computeCombos(G.slot));
    }
  }

  var combos = computeCombos(G.slot);

  // --- Phase 1: Buff/Debuff ---
  log('  ✨ 缓冲结算...');
  for (var ci = 0; ci < combos.length; ci++) {
    var c = combos[ci];
    if (!BUFF_TYPES[c.type]) continue;
    var dur = c.type === 'stun' ? getStunDuration(c.n) : getComboDuration(c.n);
    dur += G.buffDurationBonus || 0;
    switch (c.type) {
      case 'vulnerable':
        G.enemyEffects.vulnerable = (G.enemyEffects.vulnerable || 0) + dur;
        G.effectiveVulnMult = G.vulnMult || CONFIG.VULN_MULT;
        log('💔Boss易伤 +' + dur + '→' + G.enemyEffects.vulnerable + '回合');
        break;
      case 'stun':
        G.enemyEffects.stun = (G.enemyEffects.stun || 0) + dur;
        log('💫Boss眩晕 +' + dur + '→' + G.enemyEffects.stun + '回合');
        break;
      case 'atk_buff':
        G.playerEffects.atk_buff = (G.playerEffects.atk_buff || 0) + dur;
        G.effectiveAtkBuffMult = G.atkBuffMult || CONFIG.ATK_BUFF_MULT;
        log('⚡攻击加成 +' + dur + '→' + G.playerEffects.atk_buff + '回合');
        break;
      case 'def_buff':
        G.playerEffects.def_buff = (G.playerEffects.def_buff || 0) + dur;
        G.effectiveDefBuffRatio = G.defBuffRatio || CONFIG.DEF_BUFF_RATIO;
        log('💨减伤 +' + dur + '→' + G.playerEffects.def_buff + '回合');
        break;
      case 'atk_down':
        G.enemyEffects.atk_down_pct = CONFIG.ATK_DOWN_PCT;
        G.enemyEffects.atk_down = (G.enemyEffects.atk_down || 0) + dur;
        log('⬇降攻 +' + dur + '→' + G.enemyEffects.atk_down + '回合');
        break;
    }
  }

  // --- Phase 2: 攻击/防御/回血 ---
  log('  ⚡ 行动结算...');
  var slotTypeCount = {};
  for (var si = 0; si < G.slot.length; si++) {
    var st = resolveWildType(G.slot, si);
    if (!BUFF_TYPES[st] && st !== 'junk') {
      if (!slotTypeCount[st]) slotTypeCount[st] = 0;
      slotTypeCount[st]++;
    }
  }

  var actionMaxLen = {};
  for (var ci2 = 0; ci2 < combos.length; ci2++) {
    var c2 = combos[ci2];
    if (BUFF_TYPES[c2.type]) continue;
    if (!actionMaxLen[c2.type] || c2.n > actionMaxLen[c2.type]) {
      actionMaxLen[c2.type] = c2.n;
    }
  }

  // 结算攻击
  if (slotTypeCount.attack && slotTypeCount.attack >= (G.effectiveMinCombo || CONFIG.MIN_COMBO)) {
    var atkTotal = slotTypeCount.attack;
    var atkMaxLen = actionMaxLen.attack || 0;
    var baseAtk = calcBaseValue(atkTotal);
    var d = calcAttackValue(atkTotal, atkMaxLen, G);
    if (d > 0) {
      d = applyRelicModifiers('attack', d, G);
      // 读取 buff 层数（像V13一样直接从 playerEffects / enemyEffects 判断）
      if ((G.playerEffects.atk_buff || 0) > 0) d = Math.ceil(d * (G.atkBuffMult || CONFIG.ATK_BUFF_MULT));
      if ((G.enemyEffects.vulnerable || 0) > 0) d = Math.ceil(d * (G.vulnMult || CONFIG.VULN_MULT));
      var pursuitLog = '';
      if (atkMaxLen >= 4) pursuitLog = ' ' + atkMaxLen + '连×' + calcPursuitMultiplier(atkMaxLen).toFixed(1);
      if (G.enemyShield > 0) { var ab = Math.min(G.enemyShield, d); G.enemyShield -= ab; d -= ab; }
      G.enemyHP = Math.max(0, G.enemyHP - d);
      log('🗡×' + atkTotal + '→' + baseAtk + pursuitLog + '→总' + d + ' → 💀' + G.enemyHP + '🛡' + G.enemyShield);
    }
  }

  // 结算防御
  if (slotTypeCount.defend && slotTypeCount.defend >= (G.effectiveMinCombo || CONFIG.MIN_COMBO)) {
    var defTotal = slotTypeCount.defend;
    var defMaxLen = actionMaxLen.defend || 0;
    var baseDef = calcBaseValue(defTotal);
    var shieldVal = calcDefendValue(defTotal, defMaxLen, G);
    if (shieldVal > 0) {
      var pursuitLog = '';
      if (defMaxLen >= 4) pursuitLog = ' ' + defMaxLen + '连×' + calcPursuitMultiplier(defMaxLen).toFixed(1);
      G.playerShield += shieldVal;
      log('🛡×' + defTotal + '→' + baseDef + pursuitLog + '→总' + shieldVal + ' 🛡' + G.playerShield);
    }
  }

  // 结算回血
  if (slotTypeCount.heal && slotTypeCount.heal >= (G.effectiveMinCombo || CONFIG.MIN_COMBO)) {
    var healTotal = slotTypeCount.heal;
    var healMaxLen = actionMaxLen.heal || 0;
    var baseHeal = calcBaseValue(healTotal);
    var healVal = calcHealValue(healTotal, healMaxLen, G);
    if (healVal > 0) {
      var pursuitLog = '';
      if (healMaxLen >= 4) pursuitLog = ' ' + healMaxLen + '连×' + calcPursuitMultiplier(healMaxLen).toFixed(1);
      G.playerHP = Math.min(G.playerMaxHP, G.playerHP + healVal);
      log('❤×' + healTotal + '→' + baseHeal + pursuitLog + '→总' + healVal + ' ❤' + G.playerHP);
    }
  }

  // --- 未消除惩罚 ---
  if (!G.noUnmatchedPenalty) {
    var unmatchedByType = {};
    for (var si2 = 0; si2 < G.slot.length; si2++) {
      var mt = resolveWildType(G.slot, si2);
      if (!unmatchedByType[mt]) unmatchedByType[mt] = 0;
      unmatchedByType[mt]++;
    }
    var unmatchedPenalty = 0;
    for (var ut in unmatchedByType) {
      if (unmatchedByType[ut] < (G.effectiveMinCombo || CONFIG.MIN_COMBO)) {
        unmatchedPenalty += unmatchedByType[ut];
      }
    }
    if (unmatchedPenalty > 0) {
      G.playerHP = Math.max(0, G.playerHP - unmatchedPenalty * CONFIG.UNMATCHED_PENALTY);
      log('♀未消除×' + unmatchedPenalty + '→❤-' + unmatchedPenalty);
    }
  }

  G.slot = [];

  // --- Phase 3: Buff层数衰减 ---
  if ((G.playerEffects.atk_buff || 0) > 0) G.playerEffects.atk_buff--;

  // 检查胜负/元气弹
  if (G.enemyHP <= 0) { endGame(true, '💀 击败！'); return; }
  if (G.playerHP <= 0) { endGame(false, '勇者倒下了...'); return; }
  var totalRemaining = 0;
  var fp = G.piles.flat();
  for (var fi = 0; fi < fp.length; fi++) totalRemaining += fp[fi].length;
  if (totalRemaining === 0) { endGame(true, '✨ 牌库全消！元气弹斩杀！'); return; }

  render();
  updateEnemyIntent();
  document.getElementById('btn-end-turn').disabled = true;

  // 坚韧核心免死检查
  if (G.tenacityUsed === false && G.playerHP <= 0) {
    G.playerHP = 1;
    G.tenacityUsed = true;
    log('🛡 坚韧核心触发！HP锁定为1');
  }

  // 缅因猫：Boss先手（跳过玩家阶段直接enemyTurn，实际这个在回合开始时触发）
  if (G.boss && G.boss.id === 'maine_coon') {
    enemyTurn();
  } else {
    setTimeout(function() { enemyTurn(); }, 400);
  }
}

// ========== 辅助：破盾后扣玩家血量 ==========
function applyDamageToPlayer(dmg, rawAtk, label) {
  // 减伤
  if ((G.playerEffects.def_buff || 0) > 0) {
    var ratio = G.effectiveDefBuffRatio || CONFIG.DEF_BUFF_RATIO;
    dmg = Math.floor(dmg * ratio);
  }
  // 破盾
  if (G.playerShield > 0) {
    var absorb = Math.min(G.playerShield, dmg);
    G.playerShield -= absorb;
    dmg -= absorb;
  }
  G.playerHP = Math.max(0, G.playerHP - dmg);
  log(label + rawAtk + ' → ❤-' + dmg + '🛡' + G.playerShield);
}

// ========== 敌人回合 ==========
function enemyTurn() {
  log('💀 ' + G.boss.name + '行动');
  G.enemyShield = 0;

  // 眩晕检查
  if ((G.enemyEffects.stun || 0) > 0) {
    log('💫 ' + G.boss.name + '眩晕，跳过回合！');
    for (var k in G.enemyEffects) { if (G.enemyEffects[k] > 0) G.enemyEffects[k]--; }
    if (!G.enemyEffects.atk_down || G.enemyEffects.atk_down <= 0) G.enemyEffects.atk_down_pct = 0;
    G.turn++;
    G.phase = 'player';
    log('⏭ 回合' + (G.turn+1) + '开始');
    render(); updateEnemyIntent();
    document.getElementById('btn-end-turn').disabled = false;
    return;
  }

  // Boss 专属 onTurnStart
  if (G.boss.traits) {
    for (var ti = 0; ti < G.boss.traits.length; ti++) {
      var trait = G.boss.traits[ti];
      if (trait.onTurnStart) trait.onTurnStart(G);
      if (G.over) return;
    }
  }

  // 哈气/舔毛检查
  if (G.boss.hpTriggers) {
    for (var hi = 0; hi < G.boss.hpTriggers.length; hi++) {
      var trigger = G.boss.hpTriggers[hi];
      if (trigger.condition && trigger.condition(G)) {
        trigger.execute(G);
      }
    }
  }

  // 执行 Boss 行动循环
  var t = G.turn;
  // 8+回合 → 4回快速循环（攻/防/蓄/怒）
  var fastCycle = [
    { type: 'attack' },
    { type: 'defend' },
    { type: 'charge' },
    { type: 'rage' },
  ];
  var useCycle = t >= 7 ? fastCycle : G.boss.cycle;
  var cycle = useCycle[t >= 7 ? (t - 7) % fastCycle.length : t % G.boss.cycle.length];
  var rawAtk = G.boss.baseAtk + G.enemyPower;

  // 降攻效果
  if ((G.enemyEffects.atk_down || 0) > 0) {
    var reduction = G.enemyEffects.atk_down_pct || CONFIG.ATK_DOWN_PCT;
    rawAtk = Math.floor(rawAtk * (1 - reduction/100));
  }

  var shieldVal = 40 + Math.floor(G.enemyPower / 2) * 2; // 初始40，随力量递增

  switch (cycle.type) {
    case 'attack':
      var d = rawAtk;
      applyDamageToPlayer(d, rawAtk, '💀攻击');
      break;

    case 'defend':
      G.enemyShield += (cycle.shield || shieldVal);
      log('💀防御+' + (cycle.shield || shieldVal) + ' 🛡' + G.enemyShield);
      break;

    case 'buff_power':
      G.enemyPower += 2;
      log('💀蓄力+2 ⚡' + G.enemyPower);
      break;

    case 'charge':
      log('💀 蓄力中……');
      break;

    case 'rage':
      if (cycle.powerBoost) G.enemyPower += cycle.powerBoost;
      var rageMult = cycle.multiplier || 2;
      var rageDmg = rawAtk * rageMult;
      applyDamageToPlayer(rageDmg, rawAtk * rageMult, '💥怒击×' + rageMult + (cycle.powerBoost ? ' +⚡' + cycle.powerBoost : '') + '=');
      break;

    case 'double_attack':
      var d2 = rawAtk * 2;
      applyDamageToPlayer(d2, rawAtk * 2, '💥双重攻击');
      break;

    default:
      log('💀 ' + G.boss.name + ' 未定义行动');
  }

  if (G.playerHP <= 0) { endGame(false, '勇者倒下了...'); return; }

  // 坚韧核心免死（可能被Boss攻击触发）
  if (G.tenacityUsed === false && G.playerHP <= 0) {
    G.playerHP = 1;
    G.tenacityUsed = true;
    log('🛡 坚韧核心触发！HP锁定为1');
  }

  // Boss 专属 onTurnEnd
  if (G.boss.traits) {
    for (var tj = 0; tj < G.boss.traits.length; tj++) {
      var trait2 = G.boss.traits[tj];
      if (trait2.onTurnEnd) trait2.onTurnEnd(G);
    }
  }

  // 衰减敌方效果 + 玩家def_buff
  for (var k in G.enemyEffects) {
    if (G.enemyEffects[k] > 0) G.enemyEffects[k]--;
    if (G.enemyEffects[k] === 0 && k === 'atk_down') G.enemyEffects.atk_down_pct = 0;
  }
  if ((G.playerEffects.def_buff || 0) > 0) G.playerEffects.def_buff--;

  G.turn++;
  G.phase = 'player';
  // 缅因猫：下一回合Boss也先手（在executeTurn开头处理）
  log('⏭ 回合' + (G.turn+1) + '开始');
  log('💀HP:' + G.enemyHP + '🛡' + G.enemyShield + '⚡' + G.enemyPower);
  render();
  updateEnemyIntent();
  document.getElementById('btn-end-turn').disabled = false;
}

function endGame(win, msg) {
  G.over = true;
  G.phase = 'over';
  render();
  document.getElementById('btn-end-turn').disabled = true;

  var overlay = document.getElementById('result-overlay');
  if (win) {
    G.currentStage = (G.currentStage || 1) + 1;

    if (G.currentStage === 2) {
      // 第一关（骷髅）通过 → 选圣物
      showRelicSelect();
      return;
    }
    if (G.currentStage === 3) {
      // 第二关（猫猫Boss）通过 → 通关！
      overlay.classList.add('show');
      document.getElementById('result-title').textContent = '🎉 通关！';
      document.getElementById('result-desc').textContent = msg + '（存活' + G.turn + '回合）';
      log('🎉通关！' + msg);
      return;
    }
  } else {
    overlay.classList.add('show');
    document.getElementById('result-title').textContent = '💀 败北';
    document.getElementById('result-desc').textContent = msg + '（存活' + G.turn + '回合）';
    log('💀败北 ' + msg);
  }
}

function updateEnemyIntent() {
  if (G.phase === 'enemy') {
    document.getElementById('enemy-intent').innerHTML = '⏳ 行动中...';
    return;
  }
  if (G.hideIntent) {
    document.getElementById('enemy-intent').innerHTML = '❓ 意图隐藏';
    return;
  }
  var t = G.turn;
  var fastCycle = [{ type: 'attack' },{ type: 'defend' },{ type: 'charge' },{ type: 'rage' }];
  var useCycle = t >= 7 ? fastCycle : G.boss.cycle;
  var cycle = useCycle[t >= 7 ? (t - 7) % fastCycle.length : t % G.boss.cycle.length];
  var atk = G.boss.baseAtk + G.enemyPower;
  var shieldVal = 40 + Math.floor(G.enemyPower / 2) * 2;
  switch (cycle.type) {
    case 'attack':       document.getElementById('enemy-intent').innerHTML = '⚔️ 攻击 ' + atk; break;
    case 'defend':       document.getElementById('enemy-intent').innerHTML = '🛡️ 防御 +' + (cycle.shield || shieldVal); break;
    case 'buff_power':   document.getElementById('enemy-intent').innerHTML = '⚡ 蓄力 +2'; break;
    case 'charge':       document.getElementById('enemy-intent').innerHTML = '⏳ 蓄力'; break;
    case 'rage':         document.getElementById('enemy-intent').innerHTML = '💥 怒击 ' + (atk*2); break;
    case 'double_attack':document.getElementById('enemy-intent').innerHTML = '💥 双重攻击 ' + (atk*2); break;
    default:             document.getElementById('enemy-intent').innerHTML = '❓'; break;
  }

  // 舔毛/哈气预告（仅猫猫Boss，骷髅不预言）
  var extra = [];
  var hasGroom = G.boss.hpTriggers && G.boss.hpTriggers.some(function(t) { return t.id === 'groom'; });
  if (hasGroom && G.turn > 0 && G.turn % 4 === 0) extra.push('🐱舔毛');
  // 哈气预告：检查下一次攻击是否跨100血阈值
  if (G.boss.maxHP >= 300 && Math.floor((G.enemyHP - 1) / 100) < Math.floor(G.enemyHP / 100) && G.enemyHP > 0) {
    extra.push('💨哈气预告');
  }
  if (extra.length) {
    document.getElementById('enemy-intent').innerHTML += ' <span style="font-size:9px;color:#f39c12;">' + extra.join(' ') + '</span>';
  }
}

// ========== 三关流程 & 圣物选择 ==========

var STAGES = [
  { name: '第一关·骷髅', bossId: 'skeleton' },
  { name: '第二关·猫猫Boss', bossId: null }, // 随机
];

function showRelicSelect() {
  G.relicRerolls = G.relicRerolls || 0;
  G.selectedRelic = null;
  var allRelicIds = Object.keys(RELICS);
  shuffleArray(allRelicIds);
  G.relicOptions = allRelicIds.slice(0, 2);
  renderRelicOptions();
  document.getElementById('relic-select-desc').textContent =
    '第二关通过！获得圣物' + (G.relicRerolls < 1 ? '（可刷新1次）' : '');
  document.getElementById('relic-select-overlay').classList.add('show');
}

function renderRelicOptions() {
  var el = document.getElementById('relic-select-options');
  el.innerHTML = '';
  for (var oi = 0; oi < G.relicOptions.length; oi++) {
    var relic = RELICS[G.relicOptions[oi]];
    var card = document.createElement('div');
    card.className = 'relic-card';
    card.id = 'relic-opt-' + oi;
    card.innerHTML = '<div class="relic-name">' + relic.name + '</div>' +
      '<div class="relic-type">' + relic.type + '</div>' +
      '<div class="relic-desc">' + relic.desc + '</div>';
    el.appendChild(card);
  }
}

// 刷新按钮 — 换一组圣物
(function() {
  var btn = document.getElementById('btn-relic-reroll');
  btn.addEventListener('click', function() {
    var allRelicIds = Object.keys(RELICS);
    shuffleArray(allRelicIds);
    G.relicOptions = allRelicIds.slice(0, 2);
    renderRelicOptions();
    if (G.relicRerolls < 1) {
      G.relicRerolls++;
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.textContent = '🔄 刷新（已用完）';
      document.getElementById('relic-select-desc').textContent = '第二关通过！获得圣物';
    }
  });
})();

// 确认按钮 — 两个圣物全拿
(function() {
  var btn = document.getElementById('btn-relic-confirm');
  btn.addEventListener('click', function() {
    G.activeRelics = G.activeRelics || [];
    for (var i = 0; i < G.relicOptions.length; i++) {
      G.activeRelics.push(G.relicOptions[i]);
      log('🎁 获得圣物：' + RELICS[G.relicOptions[i]].name + ' — ' + RELICS[G.relicOptions[i]].desc);
    }
    document.getElementById('relic-select-overlay').classList.remove('show');
    startNextStage();
  });
})();

function startNextStage() {
  var stageIdx = G.currentStage - 1;
  if (stageIdx >= STAGES.length) return;
  var stage = STAGES[stageIdx];
  var bossId = stage.bossId;
  if (!bossId) {
    var catIds = Object.keys(BOSSES).filter(function(k) { return k !== 'skeleton' && k !== 'catToy'; });
    bossId = catIds[Math.floor(Math.random() * catIds.length)];
  }
  G.bossId = bossId;
  log('🏁 ' + stage.name + ' — 对手：' + BOSSES[bossId].name + ' ' + BOSSES[bossId].emoji);
  newGame();
}

<script>
// ============================================================
//  斩 v14 — ui.js
//  渲染函数 + DOM 事件 + log 系统
//  依赖 data.js / core.js（先加载）
// ============================================================

// ========== 渲染主函数 ==========
function render() {
  document.getElementById('player-hp').textContent = G.playerHP;
  document.getElementById('player-shield').textContent = G.playerShield;
  document.getElementById('enemy-hp').textContent = G.enemyHP;
  document.getElementById('enemy-shield').textContent = G.enemyShield;
  document.getElementById('enemy-power').textContent = G.enemyPower;
  document.getElementById('enemy-avatar').textContent = G.boss.emoji || '💀';
  document.getElementById('enemy-name').textContent = G.boss.name || '骷髅';

  // 元气弹进度
  var totalCards = CONFIG.TOTAL_CARDS;
  var remaining = 0;
  var fp = G.piles.flat();
  for (var i = 0; i < fp.length; i++) remaining += fp[i].length;
  remaining += G.slot.length;
  var consumed = totalCards - remaining;
  var spiritPct = Math.floor(consumed / totalCards * 100);
  document.getElementById('spirit-bar-inner').style.width = spiritPct + '%';
  document.getElementById('spirit-text').textContent = spiritPct + '%';

  // 玩家badges
  var pe = G.playerEffects;
  var pbHtml = '';
  if ((pe.atk_buff || 0) > 0) {
    var abm = G.effectiveAtkBuffMult || CONFIG.ATK_BUFF_MULT;
    pbHtml += '<span class="badge badge-atk-up">⚡攻×' + abm + ' ' + pe.atk_buff + 'T</span>';
  }
  if ((pe.def_buff || 0) > 0) {
    var dbr = G.effectiveDefBuffRatio || CONFIG.DEF_BUFF_RATIO;
    pbHtml += '<span class="badge badge-def-up">💨减伤×' + dbr + ' ' + pe.def_buff + 'T</span>';
  }
  document.getElementById('player-badges').innerHTML = pbHtml;

  // 敌人badges
  var ee = G.enemyEffects;
  var ebHtml = '';
  if ((ee.stun || 0) > 0) ebHtml += '<span class="badge badge-stun">💫眩晕 ' + ee.stun + 'T</span>';
  if ((ee.vulnerable || 0) > 0) ebHtml += '<span class="badge badge-vuln">💔易伤 ' + ee.vulnerable + 'T</span>';
  if ((ee.atk_down || 0) > 0) ebHtml += '<span class="badge badge-atk-down">⬇降攻 ' + ee.atk_down + 'T</span>';
  document.getElementById('enemy-badges').innerHTML = ebHtml;

  // 牌堆统计
  var totalRemaining = 0;
  for (var i2 = 0; i2 < fp.length; i2++) totalRemaining += fp[i2].length;
  document.getElementById('deck-remain').textContent = totalRemaining;
  var hiddenCount = 0, visibleCount = 0;
  for (var i3 = 0; i3 < fp.length; i3++) {
    var pile = fp[i3];
    if (!pile.length) continue;
    visibleCount++;
    if (pile.length > 1) hiddenCount += pile.length - 1;
  }
  document.getElementById('hidden-cards').textContent = hiddenCount;
  document.getElementById('visible-cards').textContent = visibleCount;

  renderBoard();
  renderSlot();

  var btn = document.getElementById('btn-end-turn');
  if (G.phase === 'player' && !G.over && G.slot.length > 0) btn.disabled = false;
  else btn.disabled = true;
}

// ========== 牌堆渲染 ==========
function renderBoard() {
  var board = document.getElementById('board');
  board.innerHTML = '';
  var flatPiles = G.piles.flat();
  for (var r = 0; r < CONFIG.BOARD_ROWS; r++) {
    for (var c = 0; c < CONFIG.BOARD_COLS; c++) {
      (function(r, c) {
        var pile = G.piles[r][c];
        var top = getTop(pile);
        var div = document.createElement('div');
        div.className = 'card-slot';
        var flatIdx = r * CONFIG.BOARD_COLS + c;

        // 锁定检查
        if (G.lockedPiles && G.lockedPiles[flatIdx]) div.classList.add('locked');

        if (!top) { div.classList.add('card-empty'); board.appendChild(div); return; }

        // 涂抹检查：显示但模糊
        if (G.smearedPiles && G.smearedPiles[flatIdx]) div.classList.add('smeared');

        var ct = CARD_TYPES[top.type] || { emoji: '⬜', label: '废牌', cssClass: 'card-junk' };
        var inner = document.createElement('div');
        inner.className = 'card ' + ct.cssClass;
        var icon = document.createElement('span');
        icon.className = 'card-icon';
        icon.textContent = ct.emoji;
        var label = document.createElement('span');
        label.className = 'card-label';
        label.textContent = ct.label;
        inner.appendChild(icon);
        inner.appendChild(label);
        div.appendChild(inner);

        if (pile.length > 1) {
          var sc = document.createElement('div');
          sc.className = 'stack-count';
          sc.textContent = pile.length;
          div.appendChild(sc);
        }

        // 双击进槽
        var lastTap = 0;
        div.addEventListener('click', function(e) {
          if (G.phase !== 'player' || G.over) return;
          var now = Date.now();
          if (now - lastTap < CONFIG.DOUBLE_TAP_DELAY) { e.preventDefault(); if (pullCard(r, c)) { log('⚡ 双击进槽'); } lastTap = 0; return; }
          lastTap = now;
          if (getTop(G.piles[r][c])) { div.classList.add('double-tap-active'); setTimeout(function() { div.classList.remove('double-tap-active'); }, 200); }
        });

        // 拖拽进槽
        var touchStartY = 0, touchStartX = 0, swiping = false;
        div.addEventListener('touchstart', function(e) {
          touchStartY = e.touches[0].clientY; touchStartX = e.touches[0].clientX; swiping = false;
        }, {passive: true});
        div.addEventListener('touchmove', function(e) {
          if (G.phase !== 'player' || G.over) return;
          var dy = e.touches[0].clientY - touchStartY;
          var dx = Math.abs(e.touches[0].clientX - touchStartX);
          if (dy > CONFIG.SWIPE_THRESHOLD && dy > dx * 1.5) { e.preventDefault(); if (!swiping && getTop(G.piles[r][c])) { swiping = true; if (pullCard(r, c)) { log('👇 拖拽进槽'); } } }
        }, {passive: false});

        board.appendChild(div);
      })(r, c);
    }
  }
}

// ========== 先知预览条 ==========
function renderProphetRow() { return; /* 先知圣物已移除 */ }
function renderSlot() {
  var bar = document.getElementById('slot-bar');
  bar.innerHTML = '';
  var effectiveSize = G.effectiveSlotSize || CONFIG.SLOT_SIZE;
  for (var i = 0; i < effectiveSize; i++) {
    var div = document.createElement('div');
    div.className = 'eslot';
    if (i < G.slot.length) {
      var card = G.slot[i];
      var ct = CARD_TYPES[card.type] || { emoji: '⬜', color: 'junk' };
      div.classList.add('filled', ct.color);
      div.textContent = ct.emoji;
    }
    // 锁定槽位
    if (G.lockedSlots && G.lockedSlots[i]) {
      div.classList.add('locked');
    }
    bar.appendChild(div);
  }
}

// ========== 连击预览 ==========
function updateComboPreview() {
  var combos = computeCombos(G.slot);
  var el = document.getElementById('combo-bar');
  if (!combos.length && !G.slot.length) { el.innerHTML = ''; return; }

  var slotTypeCount = {};
  for (var si = 0; si < G.slot.length; si++) {
    var st = resolveWildType(G.slot, si);
    if (!BUFF_TYPES[st] && st !== 'junk') {
      if (!slotTypeCount[st]) slotTypeCount[st] = 0;
      slotTypeCount[st]++;
    }
  }

  var actionMaxLen = {};
  for (var ci = 0; ci < combos.length; ci++) {
    var c = combos[ci];
    if (BUFF_TYPES[c.type]) continue;
    if (!actionMaxLen[c.type] || c.n > actionMaxLen[c.type]) {
      actionMaxLen[c.type] = c.n;
    }
  }

  var previewParts = [];
  var ACTION_TYPES = ['attack', 'defend', 'heal'];
  for (var ai = 0; ai < ACTION_TYPES.length; ai++) {
    var at = ACTION_TYPES[ai];
    if (!slotTypeCount[at] || slotTypeCount[at] < (G.effectiveMinCombo || CONFIG.MIN_COMBO)) continue;
    var total = slotTypeCount[at];
    var maxLen = actionMaxLen[at] || 0;
    var baseVal = calcBaseValue(total);
    var val = at === 'attack' ? calcAttackValue(total, maxLen, G) : (at === 'defend' ? calcDefendValue(total, maxLen, G) : calcHealValue(total, maxLen, G));
    var emoji = CARD_TYPES[at].emoji;
    var html = '<span class="combo-preview ' + at + '">' + emoji + '×' + total + '→' + baseVal;
    if (maxLen >= 4) {
      var mult = calcPursuitMultiplier(maxLen);
      html += ' ' + maxLen + '连×' + mult.toFixed(1);
    }
    html += '→总' + val + '</span>';
    previewParts.push(html);
  }

  for (var ci2 = 0; ci2 < combos.length; ci2++) {
    var c2 = combos[ci2];
    if (!BUFF_TYPES[c2.type]) continue;
    var desc = getEffectDescription(c2.type, c2.n);
    previewParts.push('<span class="combo-preview ' + c2.type + '">' + CARD_TYPES[c2.type].emoji + c2.n + '连→' + desc + '</span>');
  }

  // 未消除扣血预览
  var unmatchedByType = {};
  for (var si2 = 0; si2 < G.slot.length; si2++) {
    var mt = resolveWildType(G.slot, si2);
    if (!unmatchedByType[mt]) unmatchedByType[mt] = 0;
    unmatchedByType[mt]++;
  }
  for (var ut in unmatchedByType) {
    if (unmatchedByType[ut] >= (G.effectiveMinCombo || CONFIG.MIN_COMBO)) continue;
    var uct = CARD_TYPES[ut] || { emoji: '⬜' };
    previewParts.push('<span class="combo-none">' + uct.emoji + '×' + unmatchedByType[ut] + '→❤-' + unmatchedByType[ut] + '</span>');
  }

  el.innerHTML = previewParts.length ? previewParts.join(' ') : '<span class="combo-none">⚪ 未形成连击</span>';
}

// ========== 事件绑定 ==========
document.getElementById('btn-end-turn').addEventListener('click', function() {
  if (G.phase !== 'player' || G.over || G.slot.length === 0) return;
  executeTurn();
});

document.getElementById('btn-reset').addEventListener('click', function() {
  document.getElementById('result-overlay').classList.remove('show');
  newGame();
});

document.getElementById('btn-restart').addEventListener('click', function() {
  document.getElementById('result-overlay').classList.remove('show');
  newGame();
});

// ========== LOG ==========
function log(msg) {
  G.logLines.push(msg);
  if (G.logLines.length > CONFIG.LOG_MAX_LINES) G.logLines.shift();
  var el = document.getElementById('log');
  // 逐行用 textContent 防止 XSS
  el.innerHTML = '';
  for (var i = 0; i < G.logLines.length; i++) {
    var line = document.createElement('div');
    line.textContent = G.logLines[i];
    el.appendChild(line);
  }
  el.scrollTop = el.scrollHeight;
}

// ========== Boss 描述弹窗（长按头像） ==========
(function() {
  var el = document.getElementById('enemy-avatar');
  var timer;
  el.addEventListener('touchstart', function(e) {
    timer = setTimeout(function() { showBossInfo(); }, CONFIG.LONG_PRESS_DELAY);
  }, {passive: true});
  el.addEventListener('touchend', function() { clearTimeout(timer); });
  el.addEventListener('touchmove', function() { clearTimeout(timer); });
  // 桌面端右键
  el.addEventListener('contextmenu', function(e) { e.preventDefault(); showBossInfo(); });
})();

function showBossInfo() {
  if (!G.boss || !G.boss.desc) return;
  document.getElementById('boss-info-emoji').textContent = G.boss.emoji || '?';
  document.getElementById('boss-info-name').textContent = G.boss.name;
  document.getElementById('boss-info-mechanic').textContent = G.boss.desc;
  document.getElementById('boss-info-stats').textContent =
    'HP ' + G.boss.maxHP + ' | 攻击 ' + G.boss.baseAtk + ' | 护盾 ' + (G.boss.startShield || 0);
  document.getElementById('boss-info-overlay').style.display = 'flex';
}

document.getElementById('btn-boss-info-close').addEventListener('click', function() {
  document.getElementById('boss-info-overlay').style.display = 'none';
});
document.getElementById('boss-info-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});


// ========== 勇者圣物信息弹窗（长按头像） ==========
(function() {
  var el = document.getElementById('player-avatar');
  var timer;
  el.addEventListener('touchstart', function(e) {
    timer = setTimeout(function() { showPlayerRelicInfo(); }, CONFIG.LONG_PRESS_DELAY);
  }, {passive: true});
  el.addEventListener('touchend', function() { clearTimeout(timer); });
  el.addEventListener('touchmove', function() { clearTimeout(timer); });
  el.addEventListener('contextmenu', function(e) { e.preventDefault(); showPlayerRelicInfo(); });
})();

function showPlayerRelicInfo() {
  var relics = G.activeRelics || [];
  var desc = relics.length ? '' : '（未装配圣物）';
  for (var i = 0; i < relics.length; i++) {
    var relic = RELICS[relics[i]];
    if (relic) desc += (i ? '\n' : '') + relic.name + ': ' + relic.desc;
  }
  document.getElementById('player-info-mechanic').textContent = desc;
  document.getElementById('player-info-stats').textContent =
    'HP ' + G.playerHP + '/' + G.playerMaxHP + ' | ⚡ ' + (G.effectiveMinCombo || CONFIG.MIN_COMBO) + '连起效';
  document.getElementById('player-info-overlay').style.display = 'flex';
}

// 勇者弹窗关闭
document.getElementById('btn-player-info-close').addEventListener('click', function() {
  document.getElementById('player-info-overlay').style.display = 'none';
});
document.getElementById('player-info-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});

</script>
